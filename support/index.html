const SETUP = [

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function chips(arr,cls){return arr.map(s=>'<span class="inline-block '+cls+' rounded-full px-2.5 py-1 text-xs mr-1.5 mb-1.5">'+esc(s)+'</span>').join('');}
function card(title,inner){return '<div class="bg-white border border-stone-200 rounded-xl p-4 mb-4"><h3 class="font-semibold text-stone-800 mb-2">'+esc(title)+'</h3>'+inner+'</div>';}
function pending(msg){return '<div class="rounded-lg bg-amber-50 border border-amber-200 text-amber-800 text-sm px-3 py-2 mb-3">⏳ '+esc(msg)+'</div>';}
function money(a,c){ if(a==null) return ''; return (c||'NZD')+' '+Number(a).toFixed(2); }

function orderPerishable(o){ const kw=window.PERISH_KW||['perishable','chilled','frozen','cold','fresh']; const hay=(((o.tags||[]).join(' '))+' '+((o.lineItems||[]).map(li=>li.title||'').join(' '))).toLowerCase(); return kw.some(k=>k&&hay.includes(k)); }
function orderCard(o){
  const items = o.lineItems.map(li=>'<div class="flex justify-between text-xs text-stone-600"><span>'+(li.qty)+'× '+esc(li.title)+(li.sku?' <span class="text-stone-400">('+esc(li.sku)+')</span>':'')+'</span><span>'+money(li.price,o.currency)+'</span></div>').join('');
  const track = o.tracking.length ? o.tracking.map(t=>'<span class="text-stone-500">'+esc(t.company||'Courier')+' '+esc(t.number||'')+'</span>').join('<br>') : '<span class="text-stone-400">no tracking yet</span>';
  const ship = o.shipTo ? esc([o.shipTo.name,o.shipTo.address1,o.shipTo.city,o.shipTo.zip].filter(Boolean).join(', ')) : '';
  const trackUI = (o.tracking||[]).filter(t=>t.number).map(t=>'<div class="mt-2"><button onclick="loadTrack(\''+esc(t.number)+'\',this)" class="text-xs bg-teal-700 hover:bg-teal-800 text-white px-2 py-1 rounded-lg">🚚 Live NZ Post status</button><div class="mt-2"></div></div>').join('');
  const perish = orderPerishable(o) ? ' <span class="inline-block text-[11px] font-bold text-red-600 border border-red-300 bg-red-50 rounded px-1.5 py-0.5">PERISHABLE</span>' : '';
  return '<div class="bg-white border border-stone-200 rounded-xl p-4 mb-3">'
    + '<div class="flex justify-between items-start mb-2"><div><span class="font-semibold text-stone-800">'+esc(o.name)+'</span> <span class="text-xs text-stone-400 ml-1">'+new Date(o.createdAt).toLocaleDateString()+'</span>'+perish+'</div><div class="text-right"><div class="font-semibold text-sm">'+money(o.total,o.currency)+'</div></div></div>'
    + '<div class="flex flex-wrap gap-1.5 mb-2">'+chips([o.financial||'—',o.fulfillment||'—'],'bg-stone-100 text-stone-600 border border-stone-200')+'</div>'
    + (ship?'<div class="text-xs text-stone-500 mb-2">📍 '+ship+'</div>':'')
    + '<div class="border-t border-stone-100 pt-2 mb-2">'+items+'</div>'
    + '<div class="text-xs">'+track+'</div>'+trackUI+orderActions(o)+'</div>';
}
function orderActions(o){
  const num=(o.id||'').split('/').pop();
  return '<div class="flex flex-wrap gap-1.5 mt-2 border-t border-stone-100 pt-2">'
    +'<button onclick="raiseClaim(\''+esc(o.name||'')+'\','+(Number(o.total)||0)+')" class="text-xs border border-stone-300 rounded px-2 py-1 hover:bg-stone-50">🔁 Log resend</button>'
    +(num?'<a href="https://admin.shopify.com/store/revive-cafe/orders/'+num+'" target="_blank" class="text-xs border border-stone-300 rounded px-2 py-1 hover:bg-stone-50">Shopify ↗</a>':'')
    +'</div>';
}
function customerCard(c){
  return '<div class="bg-teal-50 border border-teal-200 rounded-xl p-4 mb-3"><div class="flex justify-between"><div><div class="font-semibold text-stone-800">'+esc(c.name||'(no name)')+ratingHtml(c.orders)+'</div><div class="text-sm text-stone-600">'+esc(c.email||'')+(c.phone?' · '+esc(c.phone):'')+'</div></div><div class="text-right text-xs text-stone-600"><div><b>'+(c.orders||0)+'</b> orders</div><div>'+money(c.spent,c.currency)+' lifetime</div></div></div>'+(c.tags&&c.tags.length?'<div class="mt-2">'+chips(c.tags,'bg-white text-teal-700 border border-teal-200')+'</div>':'')+'</div>';
}

async function runLookup(){
  const q = (document.getElementById('lookupInput').value||'').trim();
  const box = document.getElementById('lookupResults');
  if(!q){ box.innerHTML=''; return; }
  box.innerHTML = '<div class="text-stone-400 text-sm">Searching Shopify…</div>';
  try{
    const res = await fetch('/.netlify/functions/support-shopify', {
      method:'POST', headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+PORTAL_TOKEN },
      body: JSON.stringify({ query:q }),
    });
    const d = await res.json();
    if(!res.ok){ box.innerHTML = '<div class="rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm px-3 py-2">'+esc(d.error||'Lookup failed.')+'</div>'; return; }
    let html='';
    if(d.customers && d.customers.length){ html += '<h3 class="text-sm font-semibold text-stone-500 mb-2">Customer</h3>'+d.customers.map(customerCard).join(''); }
    if(d.orders && d.orders.length){ html += '<h3 class="text-sm font-semibold text-stone-500 mb-2 mt-3">Orders ('+d.orders.length+')</h3>'+d.orders.map(orderCard).join(''); }
    if(!html) html = '<div class="text-stone-400 text-sm">No matches in Shopify for “'+esc(q)+'”.</div>';
    box.innerHTML = html;
  }catch(e){ box.innerHTML = '<div class="rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm px-3 py-2">'+esc(String(e))+'</div>'; }
}


async function freshToken(){
  try{ if(window.SB){ const {data:{session}}=await window.SB.auth.getSession(); if(session&&session.access_token){ PORTAL_TOKEN=session.access_token; } } }catch(e){}
  return PORTAL_TOKEN;
}
async function apiPost(fn, body){
  let token=await freshToken();
  let res = await fetch('/.netlify/functions/'+fn, { method:'POST', headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+token }, body: JSON.stringify(body||{}) });
  if(res.status===401 && window.SB){
    try{ const { data } = await window.SB.auth.refreshSession(); if(data&&data.session){ PORTAL_TOKEN=data.session.access_token; res = await fetch('/.netlify/functions/'+fn, { method:'POST', headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+PORTAL_TOKEN }, body: JSON.stringify(body||{}) }); } }catch(e){}
  }
  let d={}; try{ d=await res.json(); }catch(e){}
  return { ok:res.ok, status:res.status, data:d };
}
function connectBtn(){ return '<a href="/.netlify/functions/gmail-connect?mailbox=cafe" class="inline-block bg-teal-700 hover:bg-teal-800 text-white text-sm font-semibold px-4 py-2 rounded-lg">Connect cafe@ mailbox</a>'; }
function threadRow(t){
  const dot = t.unread ? '<span class="inline-block w-2 h-2 rounded-full bg-teal-600 mt-1.5 shrink-0"></span>' : '<span class="inline-block w-2 h-2 mt-1.5 shrink-0"></span>';
  const who = esc(t.name || t.email || '(unknown)');
  const when = t.date ? new Date(t.date).toLocaleString('en-NZ',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
  return '<div class="flex gap-2 py-2 border-b border-stone-100 last:border-0">'+dot
    +'<div class="min-w-0 flex-1"><div class="flex justify-between gap-2"><span class="text-sm font-medium text-stone-800 truncate">'+who+'</span><span class="text-xs text-stone-400 shrink-0">'+when+'</span></div>'
    +'<div class="text-sm '+(t.unread?'font-semibold text-stone-800':'text-stone-600')+' truncate">'+esc(t.subject)+'</div>'
    +'<div class="text-xs text-stone-400 truncate">'+esc(t.snippet)+'</div></div></div>';
}
async function loadTickets(){
  const el=document.getElementById('ticketList'); if(!el) return;
  const f=window.FILTER||'open';

  if(delivered && (d.deliveredDate||d.signedBy)){ html+='<div class="text-xs text-green-700 mb-1">Delivered'+(d.deliveredDate?' '+esc(fmt(d.deliveredDate)):'')+(d.signedBy?' · signed by '+esc(d.signedBy):'')+'</div>'; }
  const evs=(d.events||[]).slice(0,6);
  html+= evs.length ? '<div class="mt-1 space-y-0.5">'+evs.map(e=>'<div class="text-xs text-stone-600 flex gap-2"><span class="text-stone-400 shrink-0 w-28">'+esc(fmt(e.date))+'</span><span>'+esc(e.detail||pretty(e.status)||'')+(e.location?' — '+esc(e.location):'')+(e.signedBy?' (signed by '+esc(e.signedBy)+')':'')+'</span></div>').join('')+'</div>'
    : '<div class="text-xs text-stone-400 mt-1">No scan events returned by the courier yet.</div>';
  if(d.trackingUrl) html+='<div class="text-xs mt-1"><a href="'+esc(d.trackingUrl)+'" target="_blank" class="text-teal-700 underline">Open on carrier site ↗</a></div>';
  if(!evs.length && d._raw){ html+='<details class="mt-1"><summary class="text-xs text-stone-400 cursor-pointer">raw response</summary><pre class="text-[10px] text-stone-500 overflow-auto max-h-40 whitespace-pre-wrap">'+esc(JSON.stringify(d._raw,null,1))+'</pre></details>'; }
  html+='</div>';
  box.innerHTML=html;
}

function notesCard(notes){
  const list=(notes&&notes.length)? notes.map(n=>'<div class="text-xs text-stone-600 border-b border-stone-100 py-1 last:border-0"><span class="text-stone-400">'+esc(n.author||'staff')+' · '+(n.created_at?new Date(n.created_at).toLocaleDateString('en-NZ'):'')+(n.type==='fulfiller'?' · fulfiller':'')+'</span><br>'+esc(n.body||'')+'</div>').join('') : '<div class="text-xs text-stone-400">No notes yet.</div>';

    +'<textarea id="noteText" rows="2" placeholder="Add an internal note (feeds the AI draft)…" class="w-full border border-stone-300 rounded-lg px-2 py-1 text-xs mt-2 focus:outline-none focus:ring-2 focus:ring-stone-400"></textarea>'
    +'<button onclick="addNote()" class="mt-1 text-xs bg-stone-700 hover:bg-stone-800 text-white px-3 py-1 rounded-lg">Add note</button></div>';

async function addNote(){

async function loadSettings(){

let INSPO_I=0;
function inspoRender(){ const arr=window.SUPPORT_QUOTES||[]; const q=arr[INSPO_I]||{t:'',s:''}; const tEl=document.getElementById('inspoText'), sEl=document.getElementById('inspoSrc'); if(tEl) tEl.textContent='“'+q.t+'”'; if(sEl) sEl.textContent=q.s?('— '+q.s):''; }
function inspoNext(){ const n=(window.SUPPORT_QUOTES||[]).length||1; INSPO_I=(INSPO_I+1)%n; inspoRender(); }
function inspoPrev(){ const n=(window.SUPPORT_QUOTES||[]).length||1; INSPO_I=(INSPO_I-1+n)%n; inspoRender(); }
function inspoInit(){ const n=(window.SUPPORT_QUOTES||[]).length||1; INSPO_I=Math.floor(Date.now()/3600000)%n; inspoRender(); }
async function loadPerishKw(){
  const r=await apiPost('support-settings',{}); const kw=(r.ok&&r.data.settings&&r.data.settings.perishable_keywords)||'perishable,chilled,frozen,cold,fresh';
  window.PERISH_KW = kw.split(',').map(x=>x.trim().toLowerCase()).filter(Boolean);
}
async function loadCodes(){
  const r=await apiPost('support-codes',{});
  if(!r.ok) return; window.NZCODES={}; (r.data.codes||[]).forEach(c=>window.NZCODES[(c.code||'').toUpperCase()]={meaning:c.meaning,perishable:c.perishable});
  renderCodes(r.data.codes||[]);
}
function renderCodes(codes){
  const el=document.getElementById('codesList'); if(!el) return;
  el.innerHTML = codes.length ? codes.map(c=>'<div class="flex items-center gap-2 py-1 border-b border-stone-100 last:border-0"><span class="font-mono text-xs w-24 shrink-0">'+esc(c.code)+'</span><span class="flex-1 text-xs text-stone-600">'+esc(c.meaning||'')+'</span><label class="text-xs flex items-center gap-1" title="perishable"><input type="checkbox" '+(c.perishable?'checked':'')+' onchange="togglePerish(\''+esc(c.code)+'\',this.checked)"> 🧊</label><button onclick="removeCode(\''+esc(c.code)+'\')" class="text-xs text-red-400 hover:text-red-600">✕</button></div>').join('') : '<div class="text-stone-400 text-xs">No codes yet.</div>';
}
async function addCode(){ const code=(document.getElementById('ncCode').value||'').trim(); if(!code) return; const meaning=(document.getElementById('ncMean').value||'').trim(); const per=document.getElementById('ncPer').checked; await apiPost('support-codes',{upsert:{code,meaning,perishable:per}}); document.getElementById('ncCode').value=''; document.getElementById('ncMean').value=''; document.getElementById('ncPer').checked=false; loadCodes(); }
async function togglePerish(code,val){ await apiPost('support-codes',{upsert:{code,perishable:val}}); loadCodes(); }
async function removeCode(code){ if(!confirm('Remove '+code+'?')) return; await apiPost('support-codes',{remove:code}); loadCodes(); }

async function resolveTicket(){
  if(!confirm('Resolve this ticket? It will be archived out of the cafe@ inbox and labelled Revive/Resolved.')) return;
  const r=await apiPost('support-resolve',{id:window.CUR.id});
  if(!r.ok){ alert((r.data&&r.data.error)||'Could not resolve.'); return; }
  show('dashboard'); loadTickets();
}

function typeSelect(cur){ const o=[['order','📦 Order'],['enquiry','💬 Enquiry'],['misc','🗂️ Misc'],['unknown','❓ Unsure']]; return '<select onchange="retagType(this.value)" class="text-xs border border-stone-300 rounded px-2 py-1">'+o.map(x=>'<option value="'+x[0]+'"'+(cur===x[0]?' selected':'')+'>'+x[1]+'</option>').join('')+'</select>'; }
async function retagType(type){ try{ await apiPost('support-ticket-type',{id:window.CUR.id, type}); }catch(e){} }
async function replaceOrder(orderId, orderName){
  if(!orderId){ alert('No Shopify order id for this order.'); return; }
  if(!confirm('Create a NEW $0 replacement order in Shopify for '+orderName+'?\n\nThis copies the items + shipping address at 100% discount and creates a REAL order.')) return;
  const cur=window.CUR||{};
  const r=await apiPost('support-create-replacement',{orderId, ticketId:cur.id||null, customerName:cur.name||'', customerEmail:cur.email||''});
  if(!r.ok){ alert((r.data&&r.data.error)||'Could not create replacement.'); return; }
  alert('✓ Created free replacement order '+r.data.orderName+' (from '+r.data.from+'). Logged to Resends — set the cause there.');
  if(window.CUR&&window.CUR.id){ apiPost('support-note-add',{id:window.CUR.id, body:'Created free replacement order '+r.data.orderName+' for '+r.data.from}); if(document.getElementById('activityList')) loadActivity(); }
}
async function raiseClaim(orderName, value){
  const cur=window.CUR||{};
  if(!confirm('Log a resend/issue for '+orderName+'? You can set the cause in the Resends tab.')) return;
  const r=await apiPost('support-claim-create',{ticketId:cur.id||null, orderName, value, status:'Open', customerName:cur.name||'', customerEmail:cur.email||''});
  if(!r.ok){ alert((r.data&&r.data.error)||'Could not log resend.'); return; }
  alert('✓ Logged to Resends — set the cause in the Resends tab.');
}
function openNewTicket(){
  const m=document.createElement('div'); m.id='ntModal'; m.className='fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4'; m.onclick=closeNewTicket;
  m.innerHTML='<div class="bg-white rounded-xl p-5 w-full max-w-md" onclick="event.stopPropagation()"><h3 class="font-bold text-lg mb-3">New ticket (phone / walk-in)</h3>'
    +'<input id="ntName" placeholder="Customer name" class="w-full border border-stone-300 rounded px-2 py-1.5 text-sm mb-2">'
    +'<input id="ntEmail" placeholder="Email (optional — links their orders)" class="w-full border border-stone-300 rounded px-2 py-1.5 text-sm mb-2">'
    +'<input id="ntOrder" placeholder="Order # (optional)" class="w-full border border-stone-300 rounded px-2 py-1.5 text-sm mb-2">'
    +'<select id="ntType" class="w-full border border-stone-300 rounded px-2 py-1.5 text-sm mb-2"><option value="enquiry">💬 Enquiry</option><option value="order">📦 Order</option><option value="misc">🗂️ Misc</option></select>'
    +'<textarea id="ntNote" rows="3" placeholder="Note — what was the call/enquiry about?" class="w-full border border-stone-300 rounded px-2 py-1.5 text-sm mb-3"></textarea>'
    +'<div class="flex justify-end gap-2"><button onclick="closeNewTicket()" class="text-sm px-3 py-1.5 rounded border border-stone-300">Cancel</button><button onclick="submitNewTicket(this)" class="text-sm px-3 py-1.5 rounded bg-teal-700 text-white font-semibold">Create ticket</button></div></div>';
  document.body.appendChild(m);
}
function closeNewTicket(){ const m=document.getElementById('ntModal'); if(m) m.remove(); }
function ntVal(id){ const e=document.getElementById(id); return e?e.value.trim():''; }
async function submitNewTicket(btn){
  const name=ntVal('ntName'),email=ntVal('ntEmail'),order=ntVal('ntOrder'),type=ntVal('ntType'),note=ntVal('ntNote');
  if(!name && !email){ alert('Enter a name or email.'); return; }
  if(btn) btn.disabled=true;
  const r=await apiPost('support-ticket-create',{name,email,orderName:order,type,note,channel:'phone',direction:'in'});
  if(!r.ok){ if(btn) btn.disabled=false; alert((r.data&&r.data.error)||'Could not create.'); return; }
  closeNewTicket(); openTicket(r.data.id);
}
const CAUSES=['Picking error','Damage in transit','Perishable not delivered in time','Wrong item sent','Lost in transit','Customer error','Other'];
function isoWeekKey(d){ d=new Date(d); const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=dt.getUTCDay()||7; dt.setUTCDate(dt.getUTCDate()+4-day); const ys=new Date(Date.UTC(dt.getUTCFullYear(),0,1)); const wk=Math.ceil((((dt-ys)/86400000)+1)/7); return dt.getUTCFullYear()+'-W'+String(wk).padStart(2,'0'); }
async function loadClaims(){
  const el=document.getElementById('claimsList'); if(!el) return;
  const r=await apiPost('support-claims',{});
  if(!r.ok){ el.innerHTML='<div class="text-amber-700 text-sm">'+esc((r.data&&r.data.error)||'Could not load.')+'</div>'; return; }
  const cs=r.data.claims||[];
  if(!cs.length){ el.innerHTML='<div class="text-stone-400 text-sm">No resends yet. Create one via ↩ Replace order (free) or 🔁 Log resend on an order.</div>'; return; }
  const byWeek={}; cs.forEach(x=>{ const k=isoWeekKey(x.created_at||Date.now()); byWeek[k]=(byWeek[k]||0)+(Number(x.value)||0); });
  const weeks=Object.keys(byWeek).sort().reverse().slice(0,6); const thisWeek=isoWeekKey(Date.now());
  const wk='<div class="flex flex-wrap gap-2 mb-4">'+weeks.map(w=>'<div class="border rounded-lg px-3 py-2 '+(w===thisWeek?'border-teal-400 bg-teal-50':'border-stone-200 bg-white')+'"><div class="text-[11px] text-stone-400">'+esc(w)+(w===thisWeek?' (this week)':'')+'</div><div class="font-semibold text-sm">NZD '+byWeek[w].toFixed(2)+'</div></div>').join('')+'</div>';
  const total=cs.reduce((a,x)=>a+(Number(x.value)||0),0);
  const rows=cs.map(x=>{
    const causeSel='<select onchange="updateCause(\''+x.id+'\',this.value)" class="text-xs border border-stone-300 rounded px-1 py-0.5"><option value="">— cause —</option>'+CAUSES.map(c=>'<option'+(x.cause===c?' selected':'')+'>'+c+'</option>').join('')+'</select>';
    const doneBtn='<button onclick="setResendStatus(\''+x.id+'\',\''+(x.status==='Done'?'Open':'Done')+'\')" class="text-xs '+(x.status==='Done'?'bg-green-100 text-green-700':'bg-stone-100 text-stone-600')+' rounded px-2 py-0.5">'+(x.status==='Done'?'✓ Done':'Mark done')+'</button>';
    return '<tr class="border-b border-stone-100 align-top"><td class="py-2 pr-2 font-medium whitespace-nowrap">'+esc(x.order_name||'')+(x.resend_order?' → '+esc(x.resend_order):'')+'</td><td class="py-2 pr-2 text-stone-600">'+esc(x.customer_name||x.customer_email||'')+'</td><td class="py-2 pr-2">'+causeSel+'</td><td class="py-2 pr-2 whitespace-nowrap">'+(x.value?('NZD '+Number(x.value).toFixed(2)):'')+'</td><td class="py-2 pr-2">'+doneBtn+'</td><td class="py-2 text-stone-400 whitespace-nowrap">'+(x.created_at?new Date(x.created_at).toLocaleDateString('en-NZ'):'')+'</td></tr>';
  }).join('');
  el.innerHTML=wk+'<table class="w-full text-sm"><thead><tr class="text-left text-xs text-stone-400 border-b border-stone-200"><th class="py-1 pr-2">Order → Resend</th><th class="py-1 pr-2">Customer</th><th class="py-1 pr-2">Cause</th><th class="py-1 pr-2">Value</th><th class="py-1 pr-2">Status</th><th class="py-1">Date</th></tr></thead><tbody>'+rows+'</tbody></table><div class="text-right text-xs text-stone-500 mt-2">Total logged: NZD '+total.toFixed(2)+'</div>';
}
async function updateCause(id,cause){ await apiPost('support-claim-update',{id,cause}); }
async function setResendStatus(id,status){ await apiPost('support-claim-update',{id,status}); loadClaims(); }

function replaceHeader(){ const po=window.CUR&&window.CUR.primaryOrder; if(!po||!po.id){ alert('No order loaded for this customer yet — give the order panel a moment.'); return; } replaceOrder(po.id, po.name); }
function orderStars(n){ n=Number(n)||0; return n>=16?5:n>=11?4:n>=6?3:n>=2?2:n>=1?1:0; }
function ratingHtml(n){ n=Number(n)||0; if(!n) return ''; const s=orderStars(n); return ' <span class="text-xs text-stone-400">('+n+')</span> <span class="text-amber-500 text-xs" title="'+n+' orders">'+'★'.repeat(s)+'<span class="text-stone-300">'+'★'.repeat(5-s)+'</span></span>'; }

function ticketDateVal(t){ const lm=(t.messages||[]).reduce((mx,m)=>(m.sent_at&&(!mx||new Date(m.sent_at)>new Date(mx)))?m.sent_at:mx,null); return lm||t.created_at||t.updated_at||0; }
function ordNum(x){ const m=(x||'').match(/\d+/); return m?parseInt(m[0],10):-1; }
function sortTickets(ts){ const k=window.SORT||'date'; const arr=(ts||[]).slice();
  if(k==='stars') arr.sort((a,b)=>(((b.customer&&b.customer.orders_count)||0)-((a.customer&&a.customer.orders_count)||0)));
  else if(k==='order') arr.sort((a,b)=>ordNum(b.matched_order)-ordNum(a.matched_order));
  else arr.sort((a,b)=>new Date(ticketDateVal(b))-new Date(ticketDateVal(a)));
  return arr;
}
function setSort(k){ window.SORT=k; const panel=document.getElementById('panel'); if(panel) panel.innerHTML=panelHTML('dashboard'); loadTickets(); }
async function loadFulfilReport(){
  const el=document.getElementById('fulfilReport'); if(!el) return;
  const r=await apiPost('support-fulfil-report',{});
  if(!r.ok){ window.FULFIL_HTML='<div class="text-amber-700 text-xs">Fulfilment report: '+esc((r.data&&r.data.error)||'unavailable')+'</div>'; el.innerHTML=window.FULFIL_HTML; return; }
  const d=r.data;
  const skus=(d.topSkus||[]).map((x,i)=>'<div class="flex justify-between text-xs py-0.5"><span class="truncate">'+(i+1)+'. '+esc(x.title||x.sku||'(no name)')+'</span><span class="font-semibold ml-2 shrink-0">'+x.qty+'</span></div>').join('');
  const types=(d.byType||[]).map(x=>'<div class="flex justify-between text-xs py-0.5"><span class="truncate">'+esc(x.type||'Other')+'</span><span class="ml-2 shrink-0">'+x.skuCount+' SKUs</span></div>').join('');
  window.FULFIL_HTML='<div class="grid grid-cols-1 md:grid-cols-2 gap-3">'
    +'<div class="bg-white border border-stone-200 rounded-xl p-3"><div class="text-xs font-semibold text-stone-700 mb-1">📦 Top 10 SKUs to fulfil <span class="text-stone-400 font-normal">('+(d.orderCount||0)+' open orders)</span></div>'+(skus||'<span class="text-xs text-stone-400">Nothing to fulfil 🎉</span>')+'</div>'
    +'<div class="bg-white border border-stone-200 rounded-xl p-3"><div class="text-xs font-semibold text-stone-700 mb-1">SKUs by product type</div>'+(d.productTypeUnavailable?'<span class="text-xs text-stone-400">Add the read_products scope to your Shopify app to enable this.</span>':(types||'<span class="text-xs text-stone-400">—</span>'))+'</div></div>';
  el.innerHTML=window.FULFIL_HTML;
}

function show(id){
  document.querySelectorAll('#sideNav a').forEach(a=>{
    a.className = a.dataset.id===id
      ? 'flex items-center gap-2 px-4 py-2 font-medium text-teal-700 bg-teal-50 border-r-2 border-teal-600'
      : 'flex items-center gap-2 px-4 py-2 text-stone-600 hover:bg-stone-50';
  });
  document.getElementById('panel').innerHTML = panelHTML(id);
  if(id==='dashboard'){ if(!window.FULFIL_HTML) loadFulfilReport(); if(window.PENDING_SYNC){ const el=document.getElementById('ticketList'); if(el) el.innerHTML='<div class="text-stone-400 text-sm">🔄 Syncing inbox…</div>'; } else loadTickets(); }
  if(id==='nonorder') loadNonOrder();
  if(id==='testimonials') loadTestimonials();
  if(id==='claims') loadClaims();
  if(id==='settings'){ loadGmailStat(); loadSettings(); loadCodes(); }
  location.hash = id;
}

(async function(){
  const gateMsg = document.getElementById('gateMsg');
  try{
    const sb = supabase.createClient(PORTAL_URL, PORTAL_ANON); window.SB = sb;
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ gateMsg.textContent = 'Please sign in…'; location.href = '/'; return; }
    PORTAL_TOKEN = session.access_token;
    document.getElementById('me').textContent = session.user.email || '';
    const _em=(session.user.email||''); const _meta=session.user.user_metadata||{}; const _local=_em.split('@')[0]||'there';
    window.OPERATOR = ((_meta.full_name||_meta.name||'').split(' ')[0]) || (_local.charAt(0).toUpperCase()+_local.slice(1));
    document.getElementById('sideNav').innerHTML = SECTIONS.map(s=>
      '<a href="#'+s.id+'" data-id="'+s.id+'" onclick="show(\''+s.id+'\');return false;" class="flex items-center gap-2 px-4 py-2 text-stone-600 hover:bg-stone-50"><span>'+s.icon+'</span>'+esc(s.label)+'</a>'
    ).join('');
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    inspoInit(); loadCodes(); loadPerishKw(); window.PENDING_SYNC=true;
    show((location.hash||'#dashboard').slice(1) || 'dashboard');
    setTimeout(()=>{ try{ syncInbox(null); }catch(e){} }, 500);
  }catch(e){ gateMsg.textContent = 'Could not load. Please return to the portal.'; }
})();
