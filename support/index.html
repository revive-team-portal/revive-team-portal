<script>
const SECTIONS = [
  {id:'dashboard', icon:'📥', label:'Inbox / Dashboard'},
  {id:'ticket',    icon:'🎫', label:'Ticket + Customer'},
  {id:'nonorder',  icon:'🗂️', label:'Non-Order'},
  {id:'ops',       icon:'📦', label:'Order Ops / Fulfilment'},
  {id:'naughty',   icon:'⚠️', label:'Naughty Box'},
  {id:'claims',    icon:'🧾', label:'Claims'},
  {id:'search',    icon:'🔎', label:'Search / Customers'},
  {id:'insights',  icon:'📈', label:'Insights'},
  {id:'settings',  icon:'⚙️', label:'Settings'},
];
const TICKET_STATUSES = ['Open','Awaiting Customer','Awaiting Fulfiller','Snoozed','Resolved'];
const ORDER_STATUSES = ['New / Unprocessed','Ready to Pack','Packed – Awaiting Courier','In Transit','Out for Delivery','Delivered','Ready for Pickup','Collected','On Hold – eShip Fix Needed','Exception – Delayed / Lost / Failed','Cancelled / Refunded'];
const NAUGHTY_RULES = [
  'Order edited in Shopify after fulfilment → eShip mismatch (offers Re-sync to eShip)',
  'Fulfilled but no tracking number / blank carrier',
  'Tracking exists but no scan after X days (stuck/lost)',
  'Paid but unfulfilled beyond SLA (e.g. 48h)',
  'Address risk — rural, PO box, incomplete',
  'Pickup not collected after N days',
  'Courier reports failed / attempted delivery',
];
const SETUP = [
  {k:'Supabase support schema', done:true, note:'13 tables + pgvector, in Revive Apps project'},
  {k:'Reason-code taxonomy', done:true, note:'15 codes seeded'},
  {k:'Portal tile + access', done:true, note:'This app, gated by portal login'},
  {k:'Claude AI proxy', done:true, note:'Reused from portal (triage + draft)'},
  {k:'Shopify Admin API', done:true, note:'Client-credentials app connected → live lookup in Search'},
  {k:'Gmail — cafe@revive.co.nz', done:true, note:'Connected → tickets ingest from the mailbox'},
  {k:'eShip / Starshipit keys', done:true, note:'Keys loaded → tracking + re-sync next'},
  {k:'Ticket persistence + triage', done:true, note:'Emails → tickets; order vs non-order split'},
];

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function chips(arr,cls){return arr.map(s=>'<span class="inline-block '+cls+' rounded-full px-2.5 py-1 text-xs mr-1.5 mb-1.5">'+esc(s)+'</span>').join('');}
function card(title,inner){return '<div class="bg-white border border-stone-200 rounded-xl p-4 mb-4"><h3 class="font-semibold text-stone-800 mb-2">'+esc(title)+'</h3>'+inner+'</div>';}
function pending(msg){return '<div class="rounded-lg bg-amber-50 border border-amber-200 text-amber-800 text-sm px-3 py-2 mb-3">⏳ '+esc(msg)+'</div>';}
function money(a,c){ if(a==null) return ''; return (c||'NZD')+' '+Number(a).toFixed(2); }

function panelHTML(id){
  if(id==='dashboard'){
    const rows = SETUP.map(s=>'<div class="flex items-start gap-2 py-1.5 border-b border-stone-100 last:border-0"><span>'+(s.done?'✅':'⬜')+'</span><div><div class="text-sm font-medium '+(s.done?'text-stone-800':'text-stone-500')+'">'+esc(s.k)+'</div><div class="text-xs text-stone-500">'+esc(s.note)+'</div></div></div>').join('');
    return '<h2 class="text-xl font-bold mb-1">Inbox / Dashboard</h2><p class="text-stone-500 text-sm mb-4">Ticket queue by priority & age, SLA + unread indicators, naughty-box badge, filters.</p>'
      + card('Build progress', rows)
      + card('Ticket statuses', chips(TICKET_STATUSES,'bg-teal-50 text-teal-700 border border-teal-200'))
      + card('Tickets', '<div class="flex items-center gap-2 mb-3"><button onclick="syncInbox(this)" class="bg-teal-700 hover:bg-teal-800 text-white text-xs font-semibold px-3 py-1.5 rounded-lg">⟳ Sync cafe@ inbox</button><span id="syncMsg" class="text-xs text-stone-500"></span></div><div id="ticketList"><div class="text-stone-400 text-sm">Loading tickets…</div></div>');
  }
  if(id==='ticket'){
    return '<h2 class="text-xl font-bold mb-1">Ticket + Customer detail</h2><p class="text-stone-500 text-sm mb-4">The core screen: thread + AI-suggested reply + order panel + notes.</p>'
      + '<div class="grid grid-cols-1 lg:grid-cols-3 gap-4">'
      + card('Left — Email thread', '<p class="text-sm text-stone-500">Inbound + outbound, threaded via Gmail thread ID. Interaction log below.</p>')
      + card('Centre — AI reply', '<p class="text-sm text-stone-500">Editable Claude draft grounded in past replies + best answers. One-click send.</p>')
      + card('Right — Order panel', '<p class="text-sm text-stone-500">Line items, totals, tags, NZ Post live status, previous orders, internal notes. (Powered by the same Shopify lookup now live in Search.)</p>')
      + '</div>' + pending('Full ticket screen assembles once cafe@ Gmail is connected.');
  }
  if(id==='nonorder'){
    return '<h2 class="text-xl font-bold mb-1">Non-Order</h2><p class="text-stone-500 text-sm mb-4">Emails that didn’t look order-related. Review and tick off — nothing is deleted.</p>'
      + '<label class="text-xs text-stone-600 flex items-center gap-1 mb-3"><input type="checkbox" id="showReviewed" onchange="loadNonOrder()"> show reviewed</label>'
      + '<div id="nonOrderList"><div class="text-stone-400 text-sm">Loading…</div></div>';
  }
  if(id==='ops'){
    return '<h2 class="text-xl font-bold mb-1">Order Ops / Fulfilment</h2><p class="text-stone-500 text-sm mb-4">Order-centric view: today’s orders by fulfilment status, packer notes, "needs eShip fix" flags.</p>'
      + card('Portal order statuses (richer than Shopify)', chips(ORDER_STATUSES,'bg-stone-100 text-stone-700 border border-stone-200'))
      + pending('Populates from Shopify order sync (next build step).');
  }
  if(id==='naughty'){
    return '<h2 class="text-xl font-bold mb-1">Naughty Box</h2><p class="text-stone-500 text-sm mb-4">Exception rules engine — flags orders needing a human. Each flag gets an operator Resolve tick, then moves to an audit log.</p>'
      + card('Trigger rules', '<ul class="list-disc pl-5 text-sm text-stone-600 space-y-1">'+NAUGHTY_RULES.map(r=>'<li>'+esc(r)+'</li>').join('')+'</ul>')
      + pending('Runs on a schedule once Shopify order sync + eShip tracking are wired.');
  }
  if(id==='claims'){
    return '<h2 class="text-xl font-bold mb-1">Claims</h2><p class="text-stone-500 text-sm mb-4">NZ Post claims register + one-click GST tax-invoice PDF.</p>'
      + card('Claim lifecycle', chips(['To lodge','Lodged','Paid','Declined'],'bg-teal-50 text-teal-700 border border-teal-200'))
      + card('Auto-spawn rule','<p class="text-sm text-stone-500">A claim is created automatically when fault = NZ Post and issue = lost/damaged.</p>')
      + pending('Invoice generator wired after eShip tracking + order value are joined.');
  }
  if(id==='search'){
    return '<h2 class="text-xl font-bold mb-1">Search / All customers</h2><p class="text-stone-500 text-sm mb-4">Live Shopify lookup by email, name, or order number.</p>'
      + '<div class="flex gap-2 max-w-xl mb-4">'
      + '<input id="lookupInput" placeholder="e.g. jane@email.com  or  #1042" onkeydown="if(event.key===\'Enter\')runLookup()" class="flex-1 border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">'
      + '<button onclick="runLookup()" class="bg-teal-700 hover:bg-teal-800 text-white text-sm font-semibold px-4 py-2 rounded-lg">Search</button></div>'
      + '<div id="lookupResults"></div>';
  }
  if(id==='insights'){
    return '<h2 class="text-xl font-bold mb-1">Insights</h2><p class="text-stone-500 text-sm mb-4">Rank recurring issues by volume (reason codes + AI clustering) → specific fixes → re-measure.</p>'
      + pending('Needs a few weeks of resolved tickets to cluster.');
  }
  if(id==='settings'){
    return '<h2 class="text-xl font-bold mb-1">Settings</h2><p class="text-stone-500 text-sm mb-4">Best-answer library, reason codes, SLA thresholds, tags, connections, roles.</p>'
      + card('Reason codes (seeded)', '<ul class="list-disc pl-5 text-sm text-stone-600 space-y-1"><li>Delivery — late / lost / damaged / wrong address</li><li>Product — quality / GF-allergen / missing / wrong item</li><li>Order — changed / cancelled / duplicate</li><li>Payment / refund</li><li>Subscription</li><li>Wholesale / enquiry</li><li>General enquiry (no fault)</li></ul>')
      + card('Connections', '<ul class="text-sm text-stone-600 space-y-1"><li>Shopify Admin — <b class="text-teal-700">connected</b></li><li>eShip / Starshipit — <b class="text-teal-700">keys loaded</b></li><li>Claude AI — <b class="text-teal-700">connected</b></li><li>Gmail (cafe@revive.co.nz) — <span id="gmailStat" class="text-amber-700 font-semibold">checking…</span> <a href="/.netlify/functions/gmail-connect?mailbox=cafe" class="text-teal-700 underline ml-1">Connect / reconnect</a></li></ul>');
  }
  return '';
}

function orderCard(o){
  const items = o.lineItems.map(li=>'<div class="flex justify-between text-xs text-stone-600"><span>'+(li.qty)+'× '+esc(li.title)+(li.sku?' <span class="text-stone-400">('+esc(li.sku)+')</span>':'')+'</span><span>'+money(li.price,o.currency)+'</span></div>').join('');
  const track = o.tracking.length ? o.tracking.map(t=>'<a href="'+esc(t.url||'#')+'" target="_blank" class="text-teal-700 underline">'+esc(t.company||'Tracking')+' '+esc(t.number||'')+'</a> <span class="text-stone-400">('+esc(t.status||'')+')</span>').join('<br>') : '<span class="text-stone-400">no tracking yet</span>';
  const ship = o.shipTo ? esc([o.shipTo.name,o.shipTo.address1,o.shipTo.city,o.shipTo.zip].filter(Boolean).join(', ')) : '';
  return '<div class="bg-white border border-stone-200 rounded-xl p-4 mb-3">'
    + '<div class="flex justify-between items-start mb-2"><div><span class="font-semibold text-stone-800">'+esc(o.name)+'</span> <span class="text-xs text-stone-400 ml-1">'+new Date(o.createdAt).toLocaleDateString()+'</span></div><div class="text-right"><div class="font-semibold text-sm">'+money(o.total,o.currency)+'</div></div></div>'
    + '<div class="flex flex-wrap gap-1.5 mb-2">'+chips([o.financial||'—',o.fulfillment||'—'],'bg-stone-100 text-stone-600 border border-stone-200')+'</div>'
    + (ship?'<div class="text-xs text-stone-500 mb-2">📍 '+ship+'</div>':'')
    + '<div class="border-t border-stone-100 pt-2 mb-2">'+items+'</div>'
    + '<div class="text-xs">'+track+'</div></div>';
}
function customerCard(c){
  return '<div class="bg-teal-50 border border-teal-200 rounded-xl p-4 mb-3"><div class="flex justify-between"><div><div class="font-semibold text-stone-800">'+esc(c.name||'(no name)')+'</div><div class="text-sm text-stone-600">'+esc(c.email||'')+(c.phone?' · '+esc(c.phone):'')+'</div></div><div class="text-right text-xs text-stone-600"><div><b>'+(c.orders||0)+'</b> orders</div><div>'+money(c.spent,c.currency)+' lifetime</div></div></div>'+(c.tags&&c.tags.length?'<div class="mt-2">'+chips(c.tags,'bg-white text-teal-700 border border-teal-200')+'</div>':'')+'</div>';
}

async function runLookup(){
  const q = (document.getElementById('lookupInput').value||'').trim();
  const box = document.getElementById('lookupResults');
  if(!q){ box.innerHTML=''; return; }
  box.innerHTML = '<div class="text-stone-400 text-sm">Searching Shopify…</div>';
  try{
    const res = await fetch('/.netlify/functions/support-shopify', {
      method:'POST', headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+PORTAL_TOKEN },
      body: JSON.stringify({ query:q }),
    });
    const d = await res.json();
    if(!res.ok){ box.innerHTML = '<div class="rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm px-3 py-2">'+esc(d.error||'Lookup failed.')+'</div>'; return; }
    let html='';
    if(d.customers && d.customers.length){ html += '<h3 class="text-sm font-semibold text-stone-500 mb-2">Customer</h3>'+d.customers.map(customerCard).join(''); }
    if(d.orders && d.orders.length){ html += '<h3 class="text-sm font-semibold text-stone-500 mb-2 mt-3">Orders ('+d.orders.length+')</h3>'+d.orders.map(orderCard).join(''); }
    if(!html) html = '<div class="text-stone-400 text-sm">No matches in Shopify for “'+esc(q)+'”.</div>';
    box.innerHTML = html;
  }catch(e){ box.innerHTML = '<div class="rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm px-3 py-2">'+esc(String(e))+'</div>'; }
}


async function apiPost(fn, body){
  const res = await fetch('/.netlify/functions/'+fn, { method:'POST', headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+PORTAL_TOKEN }, body: JSON.stringify(body||{}) });
  let d={}; try{ d=await res.json(); }catch(e){}
  return { ok:res.ok, status:res.status, data:d };
}
function connectBtn(){ return '<a href="/.netlify/functions/gmail-connect?mailbox=cafe" class="inline-block bg-teal-700 hover:bg-teal-800 text-white text-sm font-semibold px-4 py-2 rounded-lg">Connect cafe@ mailbox</a>'; }
function threadRow(t){
  const dot = t.unread ? '<span class="inline-block w-2 h-2 rounded-full bg-teal-600 mt-1.5 shrink-0"></span>' : '<span class="inline-block w-2 h-2 mt-1.5 shrink-0"></span>';
  const who = esc(t.name || t.email || '(unknown)');
  const when = t.date ? new Date(t.date).toLocaleString('en-NZ',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
  return '<div class="flex gap-2 py-2 border-b border-stone-100 last:border-0">'+dot
    +'<div class="min-w-0 flex-1"><div class="flex justify-between gap-2"><span class="text-sm font-medium text-stone-800 truncate">'+who+'</span><span class="text-xs text-stone-400 shrink-0">'+when+'</span></div>'
    +'<div class="text-sm '+(t.unread?'font-semibold text-stone-800':'text-stone-600')+' truncate">'+esc(t.subject)+'</div>'
    +'<div class="text-xs text-stone-400 truncate">'+esc(t.snippet)+'</div></div></div>';
}
async function loadTickets(){
  const el=document.getElementById('ticketList'); if(!el) return;
  const r=await apiPost('support-tickets',{triage:'order'});
  if(!r.ok){ el.innerHTML='<div class="rounded-lg bg-amber-50 border border-amber-200 text-amber-800 text-sm px-3 py-2">'+esc((r.data&&r.data.error)||'Could not load tickets.')+'</div>'; return; }
  const ts=r.data.tickets||[];
  if(!ts.length){ el.innerHTML='<div class="text-stone-400 text-sm">No tickets yet. Click “Sync cafe@ inbox” to pull recent emails into tickets.</div>'; return; }
  el.innerHTML=ts.map(ticketRow).join('');
}
function ticketRow(t){
  const c=t.customer||{}; const when=t.updated_at?new Date(t.updated_at).toLocaleString('en-NZ',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'';
  const sc={'Open':'bg-teal-100 text-teal-700','Resolved':'bg-stone-200 text-stone-600'}[t.status]||'bg-amber-100 text-amber-700';
  return '<div onclick="openTicket(\''+t.id+'\')" class="flex gap-3 py-2 px-1 border-b border-stone-100 last:border-0 hover:bg-stone-50 cursor-pointer">'
    +'<div class="min-w-0 flex-1"><div class="flex justify-between gap-2"><span class="text-sm font-medium text-stone-800 truncate">'+esc(c.name||c.email||'(unknown)')+'</span><span class="text-xs text-stone-400 shrink-0">'+when+'</span></div>'
    +'<div class="text-sm text-stone-600 truncate">'+esc(t.subject||'(no subject)')+'</div></div>'
    +'<span class="shrink-0 self-center text-xs '+sc+' rounded-full px-2 py-0.5">'+esc(t.status||'')+'</span></div>';
}
async function syncInbox(btn){
  const msg=document.getElementById('syncMsg'); if(btn) btn.disabled=true; if(msg) msg.textContent='Syncing…';
  const r=await apiPost('support-ingest',{});
  if(btn) btn.disabled=false;
  if(!r.ok){ if(msg) msg.textContent=''; document.getElementById('ticketList').innerHTML='<div class="rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm px-3 py-2">'+esc((r.data&&r.data.error)||('Sync failed ('+r.status+').'))+'</div>'; return; }
  if(msg) msg.textContent='Synced — '+(r.data.order||0)+' order + '+(r.data.nonOrder||0)+' non-order new, '+r.data.messages+' messages';
  loadTickets();
}
async function openTicket(id){
  document.querySelectorAll('#sideNav a').forEach(a=>{ a.className=a.dataset.id==='ticket'?'flex items-center gap-2 px-4 py-2 font-medium text-teal-700 bg-teal-50 border-r-2 border-teal-600':'flex items-center gap-2 px-4 py-2 text-stone-600 hover:bg-stone-50'; });
  const panel=document.getElementById('panel'); panel.innerHTML='<div class="text-stone-400 text-sm">Loading ticket…</div>';
  const r=await apiPost('support-ticket',{id});
  if(!r.ok){ panel.innerHTML='<div class="rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm px-3 py-2">'+esc((r.data&&r.data.error)||'Could not load ticket.')+'</div>'; return; }
  const t=r.data.ticket, msgs=r.data.messages||[], c=t.customer||{}; window.CUR={id:t.id, email:(c.email||'')};
  const thread=msgs.map(m=>{ const out=m.direction==='outbound';
    return '<div class="mb-3 '+(out?'pl-8':'pr-8')+'"><div class="rounded-xl border '+(out?'bg-teal-50 border-teal-200':'bg-white border-stone-200')+' p-3"><div class="flex justify-between text-xs text-stone-500 mb-1"><span>'+esc(out?'Revive (cafe@)':(c.name||m.from_addr||'Customer'))+'</span><span>'+(m.sent_at?new Date(m.sent_at).toLocaleString('en-NZ'):'')+'</span></div><div class="text-sm text-stone-700 whitespace-pre-wrap">'+esc((m.body||'').slice(0,4000))+'</div></div></div>';
  }).join('') || '<div class="text-stone-400 text-sm">No messages.</div>';
  panel.innerHTML='<a onclick="show(\'dashboard\')" class="text-teal-700 text-sm cursor-pointer">← Back to tickets</a>'
    +'<h2 class="text-xl font-bold mt-2 mb-1">'+esc(t.subject||'(no subject)')+'</h2>'
    +'<p class="text-stone-500 text-sm mb-4">'+esc(c.name||'')+' · '+esc(c.email||'')+' · <span class="bg-teal-100 text-teal-700 rounded-full px-2 py-0.5 text-xs">'+esc(t.status||'')+'</span></p>'
    +'<div class="grid grid-cols-1 lg:grid-cols-3 gap-4"><div class="lg:col-span-2">'+card('Conversation', thread)+replyBox()+'</div><div><div id="ticketOrders" class="text-stone-400 text-sm">Loading orders…</div></div></div>';
  if(c.email){
    const o=await apiPost('support-shopify',{query:c.email}); const box=document.getElementById('ticketOrders');
    if(o.ok){ let html=''; if(o.data.customers&&o.data.customers.length) html+=o.data.customers.map(customerCard).join(''); if(o.data.orders&&o.data.orders.length) html+='<h3 class="text-sm font-semibold text-stone-500 mb-2 mt-1">Orders</h3>'+o.data.orders.map(orderCard).join(''); box.innerHTML=html||'<div class="text-stone-400 text-sm">No Shopify orders.</div>'; }
    else box.innerHTML='<div class="text-amber-700 text-xs">'+esc((o.data&&o.data.error)||'Order lookup failed.')+'</div>';
  } else document.getElementById('ticketOrders').innerHTML='<div class="text-stone-400 text-sm">No customer email on file.</div>';
}

async function loadGmailStat(){
  const el=document.getElementById('gmailStat'); if(!el) return;
  const r=await apiPost('support-gmail-status',{});
  if(r.ok && r.data.connected){ el.textContent='connected'+(r.data.email?(' as '+r.data.email):''); el.className='text-teal-700 font-semibold'; }
  else { el.textContent='not connected'; el.className='text-amber-700 font-semibold'; }
}

async function loadNonOrder(){
  const el=document.getElementById('nonOrderList'); if(!el) return;
  const rev=document.getElementById('showReviewed'); const req={triage:'non_order'}; if(!(rev&&rev.checked)) req.reviewed=false;
  const r=await apiPost('support-tickets',req);
  if(!r.ok){ el.innerHTML='<div class="rounded-lg bg-amber-50 border border-amber-200 text-amber-800 text-sm px-3 py-2">'+esc((r.data&&r.data.error)||'Could not load.')+'</div>'; return; }
  const ts=r.data.tickets||[];
  if(!ts.length){ el.innerHTML='<div class="text-stone-400 text-sm">Nothing to review right now.</div>'; return; }
  el.innerHTML=ts.map(nonOrderRow).join('');
}
function nonOrderRow(t){
  const c=t.customer||{}; const when=t.updated_at?new Date(t.updated_at).toLocaleString('en-NZ',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'';
  return '<div class="flex gap-3 py-2 px-1 border-b border-stone-100 last:border-0 '+(t.reviewed?'opacity-50':'')+'">'
    +'<button title="Mark reviewed" onclick="event.stopPropagation();markReviewed(\''+t.id+'\','+(!t.reviewed)+')" class="shrink-0 self-center w-5 h-5 flex items-center justify-center rounded border text-xs '+(t.reviewed?'bg-teal-600 border-teal-600 text-white':'border-stone-300 text-transparent hover:border-teal-500')+'">✓</button>'
    +'<div onclick="openTicket(\''+t.id+'\')" class="min-w-0 flex-1 cursor-pointer"><div class="flex justify-between gap-2"><span class="text-sm font-medium text-stone-800 truncate">'+esc(c.name||c.email||'(unknown)')+'</span><span class="text-xs text-stone-400 shrink-0">'+when+'</span></div>'
    +'<div class="text-sm text-stone-600 truncate">'+esc(t.subject||'(no subject)')+'</div></div></div>';
}
async function markReviewed(id,val){ await apiPost('support-ticket-review',{id,reviewed:val}); loadNonOrder(); }

function replyBox(){
  return '<div class="bg-white border border-stone-200 rounded-xl p-4"><div class="flex items-center justify-between mb-2"><h3 class="font-semibold text-stone-800">Reply</h3><button id="draftBtn" onclick="draftReply()" class="text-xs bg-purple-600 hover:bg-purple-700 text-white font-semibold px-3 py-1.5 rounded-lg">✨ Draft with AI</button></div>'
    +'<textarea id="replyText" rows="8" placeholder="Write a reply, or click ✨ Draft with AI…" class="w-full border border-stone-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"></textarea>'
    +'<div class="flex items-center gap-2 mt-2"><button id="sendBtn" onclick="sendReply()" class="bg-teal-700 hover:bg-teal-800 text-white text-sm font-semibold px-4 py-2 rounded-lg">Send reply</button><span id="replyMsg" class="text-xs text-stone-500"></span></div></div>';
}
async function draftReply(){
  const b=document.getElementById('draftBtn'), ta=document.getElementById('replyText'), msg=document.getElementById('replyMsg');
  if(b) b.disabled=true; if(msg) msg.textContent='Drafting…';
  const r=await apiPost('support-ai-draft',{id:window.CUR.id});
  if(b) b.disabled=false;
  if(!r.ok){ if(msg) msg.textContent=''; alert((r.data&&r.data.error)||'Draft failed.'); return; }
  if(ta) ta.value=r.data.draft||''; if(msg) msg.textContent='Draft ready — edit before sending.';
}
async function sendReply(){
  const ta=document.getElementById('replyText'), msg=document.getElementById('replyMsg'), b=document.getElementById('sendBtn');
  const text=((ta&&ta.value)||'').trim(); if(!text){ if(msg) msg.textContent='Nothing to send.'; return; }
  if(!window.CUR.email){ if(msg) msg.textContent='No customer email to reply to.'; return; }
  if(!confirm('Send this reply to '+window.CUR.email+'?')) return;
  if(b) b.disabled=true; if(msg) msg.textContent='Sending…';
  const r=await apiPost('support-send',{id:window.CUR.id, to:window.CUR.email, text});
  if(b) b.disabled=false;
  if(!r.ok){ if(msg) msg.textContent=''; alert((r.data&&r.data.error)||'Send failed.'); return; }
  if(msg) msg.textContent='Sent ✓'; if(ta) ta.value='';
  openTicket(window.CUR.id);
}

function show(id){
  document.querySelectorAll('#sideNav a').forEach(a=>{
    a.className = a.dataset.id===id
      ? 'flex items-center gap-2 px-4 py-2 font-medium text-teal-700 bg-teal-50 border-r-2 border-teal-600'
      : 'flex items-center gap-2 px-4 py-2 text-stone-600 hover:bg-stone-50';
  });
  document.getElementById('panel').innerHTML = panelHTML(id);
  if(id==='dashboard') loadTickets();
  if(id==='nonorder') loadNonOrder();
  if(id==='settings') loadGmailStat();
  location.hash = id;
}

(async function(){
  const gateMsg = document.getElementById('gateMsg');
  try{
    const sb = supabase.createClient(PORTAL_URL, PORTAL_ANON);
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ gateMsg.textContent = 'Please sign in…'; location.href = '/'; return; }
    PORTAL_TOKEN = session.access_token;
    document.getElementById('me').textContent = session.user.email || '';
    document.getElementById('sideNav').innerHTML = SECTIONS.map(s=>
      '<a href="#'+s.id+'" data-id="'+s.id+'" onclick="show(\''+s.id+'\');return false;" class="flex items-center gap-2 px-4 py-2 text-stone-600 hover:bg-stone-50"><span>'+s.icon+'</span>'+esc(s.label)+'</a>'
    ).join('');
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    show((location.hash||'#dashboard').slice(1) || 'dashboard');
  }catch(e){ gateMsg.textContent = 'Could not load. Please return to the portal.'; }
})();
</script>
</body>
</html>
