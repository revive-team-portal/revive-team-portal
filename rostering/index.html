<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revive Rostering</title>
<style>
  :root{--green:#3f7d4e;--green-dark:#2e5c39;--green-light:#eaf3ec;--amber:#d99a2b;--red:#c1493c;--ink:#26332a;--muted:#6b7a6f;--line:#dbe4dc;--bg:#f6f8f5;--card:#fff}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:14px;line-height:1.45}
  header.app{background:var(--green);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:14px}
  header.app h1{font-size:18px;margin:0;font-weight:600}
  header.app .tag{font-size:11px;background:rgba(255,255,255,.18);padding:3px 8px;border-radius:20px}
  header.app .spacer{flex:1}
  header.app a.back{color:#fff;text-decoration:none;font-size:13px;opacity:.9}
  .modewrap{display:flex;background:rgba(255,255,255,.15);border-radius:8px;padding:3px}
  .modewrap button{border:0;background:transparent;color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
  .modewrap button.active{background:#fff;color:var(--green-dark)}
  .wrap{max-width:1500px;margin:0 auto;padding:16px 20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:16px}
  .card h2{font-size:15px;margin:0 0 4px;font-weight:600}
  .card h3{font-size:13px;margin:0 0 10px;font-weight:600}
  .card .sub{color:var(--muted);font-size:12.5px;margin:0 0 12px}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
  label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:4px;font-weight:500}
  input,select{font:inherit;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;width:100%}
  input[type=number]{text-align:right}
  .field{min-width:110px}
  .tablewrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:7px 9px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:600}
  td.num,th.num{text-align:right}
  td.ref,th.ref{text-align:right;color:var(--muted);background:#fafbf9}
  .btn{border:0;border-radius:8px;padding:9px 16px;font:inherit;font-weight:600;cursor:pointer}
  .btn.primary{background:var(--green);color:#fff}.btn.ghost{background:var(--green-light);color:var(--green-dark)}
  .btn.small{padding:6px 11px;font-size:12px;font-weight:600}.btn.link{background:none;color:var(--red);padding:4px;font-size:12px}
  .pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
  .pill.draft{background:#f0ede0;color:#8a7a2e}.pill.published{background:var(--green-light);color:var(--green-dark)}
  .muted{color:var(--muted)}.over{color:var(--red);font-weight:600}.warnunder{color:var(--amber);font-weight:600}
  .budgetbar{height:24px;border-radius:8px;background:#eef1ec;overflow:hidden;position:relative;border:1px solid var(--line)}
  .budgetbar .fill{height:100%;transition:width .3s,background .3s}
  .budgetbar .lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
  .stat-row{display:flex;gap:18px;flex-wrap:wrap;margin:6px 0 10px}
  .stat .n{font-size:20px;font-weight:700}.stat .l{font-size:11px;color:var(--muted)}
  .totrow td{font-weight:700;border-top:2px solid var(--line);border-bottom:0}
  .sep td{border-top:2px solid var(--green);background:var(--green-light);font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--green-dark);font-weight:700}
  .flex-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;flex-wrap:wrap}
  .weektabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .weektabs button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 12px;cursor:pointer;font:inherit;text-align:left}
  .weektabs button.active{border-color:var(--green);background:var(--green-light);color:var(--green-dark);font-weight:600}
  .weektabs button .d{font-size:11px;color:var(--muted)}.weektabs button.active .d{color:var(--green-dark)}
  .hidden{display:none}
  .settings-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px}@media(max-width:760px){.settings-cols{grid-template-columns:1fr}}
  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-bottom:12px}
  .legend .li{display:flex;align-items:center;gap:5px;font-size:11.5px}
  .legend{gap:8px 16px}
  .legend .li{gap:6px;font-size:12.5px}
  .legend .sw{width:24px;height:24px;border-radius:6px;flex:none;display:inline-flex;align-items:center;justify-content:center;font-size:14px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
  .legend .rate{color:var(--muted);font-size:10.5px}
  .chip{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;font-size:11px;vertical-align:middle}
  .planner-grid{display:grid;grid-template-columns:1.2fr 0.8fr;grid-template-rows:auto auto;gap:16px;align-items:start}
  .planner-grid .timeline{grid-row:1 / span 2;margin-bottom:0}.planner-grid .job{grid-column:2;grid-row:1;margin-bottom:0}.planner-grid .emp{grid-column:2;grid-row:2;margin-bottom:0}
  @media(max-width:1080px){.planner-grid{grid-template-columns:1fr}.planner-grid .timeline{grid-row:auto}.planner-grid .job,.planner-grid .emp{grid-column:1}}
  .boardV{display:flex;min-width:820px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}
  .gutter{width:42px;flex:none;border-right:1px solid var(--line);background:#fafbf9}
  .gutter .gh{height:26px;border-bottom:1px solid var(--line)}.gutter .gbody{position:relative;height:616px}
  .gutter .gbody span{position:absolute;right:5px;transform:translateY(-50%);font-size:9.5px;color:var(--muted)}.gutter .gf{height:26px;border-top:1px solid var(--line)}
  .daycol{flex:1;min-width:118px;border-right:1px solid var(--line)}.daycol:last-child{border-right:0}
  .dayhead{height:26px;display:flex;align-items:center;justify-content:center;gap:3px;font-weight:600;font-size:12px;background:#f2f6f1;border-bottom:1px solid var(--line)}
  .daycopy,.dayctl{border:0;background:transparent;cursor:pointer;font-size:10px;padding:0 1px;opacity:.55;line-height:1}
  .daycopy:hover,.dayctl:hover{opacity:1}
  .daybody.holiday{background:#e6e9e6}
  .daybody.holiday .vblk{opacity:.4}
  .dayhol{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;writing-mode:vertical-rl;font-size:13px;font-weight:700;color:#9aa79d;letter-spacing:3px;pointer-events:none;z-index:0}
  .tbadge{display:inline-block;font-size:9px;font-weight:700;background:var(--green-light);color:var(--green-dark);border-radius:4px;padding:1px 4px;vertical-align:middle}
  .paintbtn{cursor:pointer;opacity:.5;font-size:12px;margin-left:4px}
  .paintbtn:hover,.paintbtn.on{opacity:1}
  .paintbanner{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--green-dark);color:#fff;padding:8px 14px;border-radius:8px;font-size:13px;z-index:60;box-shadow:0 4px 14px rgba(0,0,0,.3);display:flex;align-items:center;gap:6px}
  body.painting .daybody{cursor:crosshair}
  .ctxmenu{position:fixed;z-index:70;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.22);padding:4px;min-width:150px;max-height:320px;overflow:auto;font-size:12.5px}
  .ctxmenu .ctxh{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:5px 8px 2px}
  .ctxmenu .ctxi{padding:5px 8px;border-radius:5px;cursor:pointer;white-space:nowrap}
  .ctxmenu .ctxi:hover{background:var(--green-light)}
  .daybody{position:relative;height:616px;cursor:copy;background:repeating-linear-gradient(180deg,#dbe4dc 0,#dbe4dc 1px,transparent 1px,transparent 44px),repeating-linear-gradient(180deg,#eef1ec 0,#eef1ec 1px,transparent 1px,transparent 22px)}
  .vblk{position:absolute;border-radius:5px;color:#fff;overflow:hidden;cursor:grab;box-shadow:0 1px 2px rgba(0,0,0,.18);user-select:none;border:1px solid rgba(255,255,255,.35)}
  .vblk .lbl{position:relative;z-index:2;writing-mode:vertical-rl;text-orientation:mixed;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;font-size:10px;padding:3px 1px;height:100%}
  .vblk .rzv{position:absolute;left:0;right:0;bottom:0;height:9px;cursor:ns-resize;border-radius:0 0 5px 5px;z-index:3}
  .vblk .brk{position:absolute;left:0;right:0;z-index:2;cursor:ns-resize;display:flex;align-items:center;justify-content:center;font-size:12px;background:#fff;color:#333;border-top:1px solid rgba(0,0,0,.15);border-bottom:1px solid rgba(0,0,0,.15)}
  .vblk .rest{position:absolute;left:0;right:0;z-index:2;cursor:ns-resize;display:flex;align-items:center;justify-content:center;font-size:11px;background:#fff;color:#333;border-top:1px solid rgba(0,0,0,.12);border-bottom:1px solid rgba(0,0,0,.12)}
  .vblk .brk .rt{position:absolute;top:0;left:0;right:0;height:6px;cursor:ns-resize}.vblk .brk .rb{position:absolute;bottom:0;left:0;right:0;height:6px;cursor:ns-resize}
  .vblk .brk .bd,.vblk .rest .bd{position:absolute;top:-2px;right:1px;font-size:10px;cursor:pointer;color:#c1493c;z-index:5}
  .vblk.sick .lbl{color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
  .vblk .sickov{position:absolute;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(45deg,rgba(255,255,255,.65) 0,rgba(255,255,255,.65) 5px,transparent 5px,transparent 11px)}
  .vblk.dragging{cursor:grabbing;box-shadow:0 4px 12px rgba(0,0,0,.32);z-index:6}
  .dayfoot{height:24px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:#fafbf9;border-top:1px solid var(--line)}
  .pubcell{padding:6px;min-height:40px;display:flex;flex-direction:column;gap:3px}
  .pubblk{border-radius:5px;color:#fff;font-size:11px;padding:3px 7px;font-weight:600}
  .board{min-width:900px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .brow{display:grid;grid-template-columns:120px repeat(6,1fr) 74px;border-bottom:1px solid var(--line)}.brow:last-child{border-bottom:0}.brow.head{background:#f2f6f1}
  .bcell{border-right:1px solid var(--line);padding:0}.bcell:last-child{border-right:0}
  .bcell.name{padding:8px 10px;display:flex;flex-direction:column;justify-content:center;background:#fafbf9}.bcell.name .nm{font-weight:600;font-size:13px}
  .bcell.hd{padding:8px 6px;text-align:center;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:600}
  .bcell.tot{display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;background:#fafbf9}
  .modal-bg{position:fixed;inset:0;background:rgba(20,30,22,.4);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal{background:#fff;border-radius:12px;padding:20px;width:340px;box-shadow:0 12px 40px rgba(0,0,0,.25)}
  .modal h3{margin:0 0 14px;font-size:15px}.modal .frow{margin-bottom:12px}.modal .actions{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
  .money-hidden{letter-spacing:2px;color:var(--muted)}
  .center{min-height:70vh;display:flex;align-items:center;justify-content:center}
  .loginbox{width:320px;text-align:center}
  .pubhead{background:var(--green-dark);color:#fff;padding:20px 22px;border-radius:12px;margin-bottom:18px}.pubhead h2{color:#fff;margin:0;font-size:20px}
  .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;z-index:60;opacity:0;transition:opacity .2s}
  .toast.show{opacity:.95}
</style>
</head>
<body>
<div id="root"><div class="center"><div class="muted">Loading…</div></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ================= config =================
const SUPABASE_URL="https://zpcbtfdjcsbdeqnizrpr.supabase.co";
const SUPABASE_KEY="sb_publishable_zbquLMEu4X110BhMpNZRmQ_OgtYzhst"; // publishable key — safe in client
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri"];
const DAY_START=6*60,DAY_END=20*60,SPAN=DAY_END-DAY_START,SNAP=15,MEAL=30,MEAL_MIN=4,REST=10,REST_MIN=2,BAR_W=44;
const FAMILIES={prod:["#3f7d4e","#5aa06a","#2e6b40","#84c295"],ful:["#d98c3f","#c06f26","#e8ab63","#a85e1d"],kit:["#3a6ea5","#5f92c4","#2b5480","#87addb"],cafe:["#c1493c","#a5352b","#d97064","#8f2b22"],admin:["#7a5ca8","#9a7cc4","#5e4488","#b7a0dd"],other:["#4a9d94","#3a8078","#6bb3aa","#2e625c"]};
const STATUSES=["Draft","Published draft","Published","Revision 1","Revision 2","Revision 3"];

// ================= state =================
let staff=[],acts=[],weeks=[],activeWeek=null,pubWeek=null,payRevealed=false,payTimer=null,me=null,dayClip=null,templates=[],notifyOnPublish=true,paint=null;

// ================= helpers =================
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1800);}
function wk(id){return weeks.find(w=>w.id===id);}
function money(n){return "$"+Math.round(n).toLocaleString();}
function fmtDate(d){if(!d)return "";return new Date(d+"T00:00").toLocaleDateString("en-NZ",{day:"numeric",month:"short",year:"numeric"});}
function fmtT(t){if(!t)return "";let[h,m]=t.split(":").map(Number);const ap=h<12?"am":"pm";let hh=h%12;if(hh===0)hh=12;return m?`${hh}:${String(m).padStart(2,"0")}${ap}`:`${hh}${ap}`;}
function t2m(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function m2t(m){m=Math.round(m);return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0");}
function rawDur(b){return Math.max(0,(t2m(b.f)-t2m(b.s))/60);}
function paidDur(b){if(b.sick)return 0;return Math.max(0,rawDur(b)-(b.brk?b.brk.len/60:0));}
function actById(id){return acts.find(a=>a.id===id)||{name:"?",emoji:"🏷️",color:"#999",kind:"fixed"};}
function staffById(id){return staff.find(s=>s.id===id)||{first_name:"?"};}
function staffFirst(id){return staffById(id).first_name;}
function shiftTarget(b){const a=actById(b.act);if(a.kind!=="variable"||!a.units_per_hour)return "";return Math.round(a.units_per_hour*paidDur(b))+" "+(a.unit||"");}
function blockLabel(b){const fn=staffFirst(b.sid);const base=b.label?fn+" · "+b.label:fn;if(b.sick)return base+" · COVER";const tg=shiftTarget(b);return tg?base+" · "+tg:base;}
function staffHours(w,sid){return w.blocks.filter(b=>b.sid===sid).reduce((a,b)=>a+paidDur(b),0);}
function dayHours(w,day){return w.blocks.filter(b=>b.day===day).reduce((a,b)=>a+paidDur(b),0);}
function rosteredHours(w){return w.blocks.reduce((a,b)=>a+paidDur(b),0);}
function actHours(w,aid){return w.blocks.filter(b=>b.act===aid).reduce((a,b)=>a+paidDur(b),0);}
function projectedCost(w){return w.blocks.reduce((a,b)=>a+paidDur(b)*(staffById(b.sid).rate||0),0);}
function variableActs(){return acts.filter(a=>a.kind==="variable");}
function fixedActs(){return acts.filter(a=>a.kind==="fixed");}
function otherActs(){return acts.filter(a=>a.kind==="other");}
function totalRequired(w){return variableActs().reduce((a,t)=>a+(t.units_per_hour>0?(w.demand[t.id]||0)/t.units_per_hour:0),0);}
function totalFixed(){return fixedActs().reduce((a,f)=>a+(f.weekly_hours||0),0);}
function targetHours(w){return totalRequired(w)+totalFixed();}
function planHours(w,a){return a.kind==="variable"?(a.units_per_hour>0?(w.demand[a.id]||0)/a.units_per_hour:0):(a.weekly_hours||0);}
function prevWeekOf(w){const i=weeks.findIndex(x=>x.id===w.id);return i>0?weeks[i-1]:null;}
function weekEnding(w){const d=new Date(w.start+"T00:00");d.setDate(d.getDate()+5);return d.toISOString().slice(0,10);}
function isLive(w){return w.status!=="Draft";}
function normalizeBreaks(w){w.blocks.forEach(b=>{const rawMin=rawDur(b)*60,S=t2m(b.s),F=t2m(b.f);
  if(rawDur(b)>MEAL_MIN&&!b.noBreak&&!b.sick){if(!b.brk)b.brk={at:Math.round((S+rawMin*0.6-MEAL/2)/SNAP)*SNAP,len:MEAL};b.brk.len=Math.max(15,Math.min(b.brk.len,rawMin-15));b.brk.at=Math.max(S,Math.min(F-b.brk.len,b.brk.at));}else b.brk=null;
  if(rawDur(b)>REST_MIN&&!b.noRest&&!b.sick){if(!b.rest)b.rest={at:Math.round((S+rawMin*0.25-REST/2)/SNAP)*SNAP};b.rest.at=Math.max(S,Math.min(F-REST,b.rest.at));}else b.rest=null;});}
function packColumns(bl){const s=[...bl].sort((a,b)=>t2m(a.s)-t2m(b.s)||t2m(a.f)-t2m(b.f));const ce=[],co={};s.forEach(b=>{let p=false;for(let c=0;c<ce.length;c++){if(ce[c]<=t2m(b.s)){co[b.id]=c;ce[c]=t2m(b.f);p=true;break;}}if(!p){co[b.id]=ce.length;ce.push(t2m(b.f));}});return{ncol:Math.max(1,ce.length),colOf:co};}
function familyColor(){const cnt={};acts.forEach(a=>{const pal=FAMILIES[a.family]||FAMILIES.admin;const i=(cnt[a.family]=(cnt[a.family]||0)+1)-1;a.color=pal[i%pal.length];});}

// ================= data mapping =================
function shiftFromRow(r){return{id:r.id,week_id:r.week_id,sid:r.staff_id,act:r.activity_id,day:r.day,s:m2t(r.start_min),f:m2t(r.end_min),label:r.custom_label,brk:r.meal_at!=null?{at:r.meal_at,len:r.meal_len||MEAL}:null,rest:r.rest_at!=null?{at:r.rest_at}:null,noBreak:r.no_meal,noRest:r.no_rest,sick:r.sick};}
function rowFromShift(b){return{week_id:b.week_id||activeWeek,staff_id:b.sid,activity_id:b.act,day:b.day,start_min:t2m(b.s),end_min:t2m(b.f),custom_label:b.label||null,meal_at:b.brk?b.brk.at:null,meal_len:b.brk?b.brk.len:null,rest_at:b.rest?b.rest.at:null,no_meal:!!b.noBreak,no_rest:!!b.noRest,sick:!!b.sick};}

async function loadAll(){
  const [st,ac,ws,dm,sh,tp]=await Promise.all([
    sb.from("roster_staff").select("*").order("sort_order"),
    sb.from("roster_activities").select("*").order("sort_order"),
    sb.from("roster_weeks").select("*").order("start_date"),
    sb.from("roster_demand").select("*"),
    sb.from("roster_shifts").select("*"),
    sb.from("roster_templates").select("*").order("created_at")
  ]);
  if(st.error||ac.error||ws.error){throw (st.error||ac.error||ws.error);}
  staff=st.data.map(s=>({...s,name:s.first_name}));
  acts=ac.data.map(a=>({...a}));familyColor();
  templates=tp.data||[];
  weeks=ws.data.map(w=>({...w,start:w.start_date,demand:{},blocks:[],holidays:w.holidays||[]}));
  (dm.data||[]).forEach(d=>{const w=wk(d.week_id);if(w)w.demand[d.activity_id]=Number(d.quantity);});
  (sh.data||[]).forEach(r=>{const w=wk(r.week_id);if(w)w.blocks.push(shiftFromRow(r));});
  weeks.forEach(normalizeBreaks);
  if(weeks.length&&!activeWeek)activeWeek=weeks[weeks.length-1].id;
}

// ================= persistence =================
async function saveShift(b){const {error}=await sb.from("roster_shifts").update(rowFromShift(b)).eq("id",b.id);if(error)toast("Save failed");}
async function addShiftRow(b){const {data,error}=await sb.from("roster_shifts").insert(rowFromShift(b)).select().single();if(error){toast("Add failed");return;}b.id=data.id;}
async function delShiftRow(id){await sb.from("roster_shifts").delete().eq("id",id);}
async function saveWeek(w){await sb.from("roster_weeks").update({start_date:w.start,budget:w.budget,status:w.status,holidays:w.holidays||[],updated_at:new Date().toISOString()}).eq("id",w.id);}
async function saveDemand(wid,aid,q){await sb.from("roster_demand").upsert({week_id:wid,activity_id:aid,quantity:q});}
async function saveStaff(s){await sb.from("roster_staff").update({first_name:s.first_name,last_name:s.last_name,email:s.email,rate:s.rate,min_hours:s.min_hours,max_hours:s.max_hours,employment_type:s.employment_type,active:s.active,default_activity_id:s.default_activity_id||null}).eq("id",s.id);}
async function saveActivity(a){await sb.from("roster_activities").update({name:a.name,emoji:a.emoji,units_per_hour:a.units_per_hour,weekly_hours:a.weekly_hours,family:a.family}).eq("id",a.id);}

async function boot(){
  const params=new URLSearchParams(location.search);
  if(params.get("view")==="public"){return bootPublic(params.get("week"));}
  const {data:{session}}=await sb.auth.getSession();
  if(!session){return renderLogin();}
  const {data:planner}=await sb.rpc("is_roster_planner");
  if(!planner){return renderNoAccess();}
  me=session.user;
  await loadAll();
  renderShell();
  renderPlanner();
}

async function doLogin(){

  location.reload();
}

function setMode(m){
  document.getElementById("planMode").classList.toggle("hidden",m!=="plan");
  document.getElementById("settingsMode").classList.toggle("hidden",m!=="settings");
  document.getElementById("publicMode").classList.toggle("hidden",m!=="public");
  document.getElementById("mPlan").classList.toggle("active",m==="plan");
  document.getElementById("mSettings").classList.toggle("active",m==="settings");
  document.getElementById("mPublic").classList.toggle("active",m==="public");
  if(m==="plan")renderPlanner();if(m==="settings")renderSettings();if(m==="public")renderPublicInApp();
}

function renderWeekTabsGeneric(elId,onclick,filter,activeId){const el=document.getElementById(elId);if(!el)return;el.innerHTML="";weeks.filter(filter||(()=>true)).forEach(w=>{const b=document.createElement("button");b.className=w.id===activeId?"active":"";b.innerHTML=`Week ending ${fmtDate(weekEnding(w))}`+(elId!=="pubWeektabs"?`<div class="d">${w.status}</div>`:"");b.onclick=()=>onclick(w.id);el.appendChild(b);});}
function renderLegend(elId){const el=document.getElementById(elId);if(!el)return;el.innerHTML="";acts.forEach(a=>{const d=document.createElement("div");d.className="li";const target=a.kind==="variable"?`<span class="rate">${a.units_per_hour} ${a.unit}/hr</span>`:"";const pb=elId==='legend'?` <span class="paintbtn ${paint&&paint.kind==='act'&&paint.id===a.id?'on':''}" title="Paint this task onto shifts" onclick="setPaint('act','${a.id}')">🖌</span>`:"";d.innerHTML=`<span class="sw" style="background:${a.color}">${a.emoji}</span>${a.name} ${target}${pb}`;el.appendChild(d);});}
function statusControl(w){const sick=w.blocks.filter(b=>b.sick).length;const sickTag=sick?`<span class="pill" style="background:#fde2df;color:#b23b2f;margin-left:8px">🤒 ${sick} to cover</span>`:"";const revBtn=isLive(w)?`<button class="btn ghost small" style="margin-left:8px" onclick="publishRevision()">${w.status==="Published draft"?'✅ Publish final':'↻ Publish revision'}</button>`:"";const emailChk=`<label style="font-size:11px;margin-left:8px;white-space:nowrap"><input type="checkbox" ${notifyOnPublish?'checked':''} onchange="notifyOnPublish=this.checked"> email staff</label>`;return `<span class="pill ${isLive(w)?'published':'draft'}">${w.status}</span><select style="width:auto;margin-left:8px;padding:6px 8px" onchange="setStatus(this.value)">${STATUSES.map(st=>`<option ${st===w.status?'selected':''}>${st}</option>`).join("")}</select>${revBtn}${emailChk}${sickTag}`;}
async function setStatus(val){const w=wk(activeWeek);const wasLive=isLive(w);w.status=val;await saveWeek(w);renderPlanner();if(isLive(w)&&!wasLive&&notifyOnPublish)notifyStaff(w,"published");}
async function publishRevision(){const w=wk(activeWeek);let next;if(w.status==="Published draft")next="Published";else if(w.status==="Published"||!isLive(w))next="Revision 1";else{const n=parseInt((w.status.match(/\d+/)||[1])[0]);next="Revision "+Math.min(3,n+1);}w.status=next;await saveWeek(w);renderPlanner();if(notifyOnPublish)notifyStaff(w,next==="Published"?"published":"revision");}
function notifyStaff(w,type){const ids=[...new Set(w.blocks.filter(b=>!b.sick).map(b=>b.sid))];const recips=staff.filter(s=>ids.includes(s.id));const link=`${location.origin}/rostering/?view=public&week=${w.id}`;const bg=document.createElement("div");bg.className="modal-bg";bg.id="notifyBg";bg.innerHTML=`<div class="modal" onclick="event.stopPropagation()"><h3>📧 ${type==='revision'?'Revision published':'Roster published'}</h3><p class="sub">Ready to notify the ${recips.length} staff rostered this week:</p><div style="max-height:170px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:12px">${recips.map(s=>`${s.first_name} ${s.last_name} &lt;${s.email||'no email'}&gt;`).join("<br>")||'No staff rostered.'}</div><p class="sub" style="margin-top:10px">Link: <span class="muted">${link}</span></p><div class="actions"><span class="muted" style="font-size:11px">Email sending is wired up separately.</span><button class="btn primary small" onclick="document.getElementById('notifyBg').remove()">OK</button></div></div>`;bg.onclick=()=>bg.remove();document.body.appendChild(bg);}

function renderPlanner(){const w=wk(activeWeek);if(!w){document.getElementById("weektabs").innerHTML='<span class="muted">No weeks yet — click “+ New week”.</span>';['bTargetHrs','bRosterHrs','bCost','bBudget'].forEach(i=>document.getElementById(i).textContent="—");return;}normalizeBreaks(w);renderWeekTabsGeneric("weektabs",id=>{activeWeek=id;renderPlanner();},null,activeWeek);document.getElementById("weekStart").value=weekEnding(w);document.getElementById("weekBudget").value=w.budget;document.getElementById("statusArea").innerHTML=statusControl(w);renderLegend("legend");renderBoard();renderJobPanel();renderEmployeePanel();renderStats();renderTemplateSelect();}
async function onWeekMeta(){const w=wk(activeWeek);const fri=document.getElementById("weekStart").value;if(fri){const d=new Date(fri+"T00:00");d.setDate(d.getDate()-5);w.start=d.toISOString().slice(0,10);}w.budget=+document.getElementById("weekBudget").value||0;await saveWeek(w);renderWeekTabsGeneric("weektabs",id=>{activeWeek=id;renderPlanner();},null,activeWeek);renderStats();}

function renderBoard(){const w=wk(activeWeek);normalizeBreaks(w);const board=document.getElementById("board");board.innerHTML="";const gutter=document.createElement("div");gutter.className="gutter";let gb=`<div class="gh"></div><div class="gbody">`;for(let h=6;h<=20;h++){const pct=(h*60-DAY_START)/SPAN*100;gb+=`<span style="top:${pct}%">${(h%12)||12}${h<12?'a':'p'}</span>`;}gb+=`</div><div class="gf"></div>`;gutter.innerHTML=gb;board.appendChild(gutter);
  let Ncol=1;const layout=[];for(let d=0;d<6;d++){const bl=w.blocks.filter(b=>b.day===d);const L=packColumns(bl);layout[d]=L;Ncol=Math.max(Ncol,L.ncol);}
  const colW=Math.max(Ncol*BAR_W,156);
  for(let d=0;d<6;d++){const col=document.createElement("div");col.className="daycol";col.style.flex="0 0 auto";col.style.width=colW+"px";
    const isHol=(w.holidays||[]).includes(d);
    col.innerHTML=`<div class="dayhead">${DAYS[d]} <button class="dayctl" title="Copy day" onclick="copyDay(${d})">⧉</button>${dayClip?`<button class="dayctl" title="Paste day here" onclick="pasteDay(${d})">📋</button>`:""}<button class="dayctl" title="Clear day" onclick="clearDay(${d})">🧹</button><button class="dayctl" title="${isHol?'Remove holiday':'Mark as holiday'}" onclick="toggleHoliday(${d})">${isHol?'✖':'🏖'}</button></div>`;
    const dbody=document.createElement("div");dbody.className="daybody"+(isHol?" holiday":"");dbody.dataset.day=d;
    if(isHol)dbody.innerHTML=`<div class="dayhol">HOLIDAY</div>`;
    const {colOf}=layout[d];w.blocks.filter(b=>b.day===d).forEach(b=>dbody.appendChild(makeBlock(b,colOf[b.id],Ncol)));
    dbody.addEventListener("pointerdown",onDayPointerDown);col.appendChild(dbody);
    const foot=document.createElement("div");foot.className="dayfoot";foot.textContent=dayHours(w,d).toFixed(1)+"h";col.appendChild(foot);board.appendChild(col);}}
function makeBlock(b,col,ncol){const a=actById(b.act);const el=document.createElement("div");el.className="vblk";el.style.background=a.color;el.style.left=(col*BAR_W+1)+"px";el.style.width=(BAR_W-3)+"px";el.style.top=((t2m(b.s)-DAY_START)/SPAN*100)+"%";el.style.height=(rawDur(b)*60/SPAN*100)+"%";if(b.sick)el.classList.add("sick");el.title=`${staffFirst(b.sid)} · ${a.name}: ${fmtT(b.s)}–${fmtT(b.f)}`;el.innerHTML=`<div class="lbl">${b.sick?"🤒 ":""}${a.emoji} ${blockLabel(b)}</div>`+(b.sick?`<div class="sickov"></div>`:"")+restHtml(b)+breakHtml(b)+`<div class="rzv"></div>`;el.dataset.bid=b.id;el.addEventListener("pointerdown",onBlockPointerDown);el.addEventListener("contextmenu",onBlockContext);const be=el.querySelector(".brk");if(be)be.addEventListener("pointerdown",onBreakPointerDown);const re=el.querySelector(".rest");if(re)re.addEventListener("pointerdown",onRestPointerDown);return el;}
function breakHtml(b){if(!b.brk)return "";const raw=rawDur(b)*60;return `<div class="brk" style="top:${(b.brk.at-t2m(b.s))/raw*100}%;height:${b.brk.len/raw*100}%"><div class="rt"></div>🍽️<div class="bd" title="remove meal">×</div><div class="rb"></div></div>`;}
function restHtml(b){if(!b.rest)return "";const raw=rawDur(b)*60;return `<div class="rest" style="top:${(b.rest.at-t2m(b.s))/raw*100}%;height:${REST/raw*100}%">☕<div class="bd" title="remove rest">×</div></div>`;}
function posBlock(el,b){el.style.top=((t2m(b.s)-DAY_START)/SPAN*100)+"%";el.style.height=(rawDur(b)*60/SPAN*100)+"%";const a=actById(b.act);el.querySelector(".lbl").innerHTML=`${a.emoji} ${blockLabel(b)}`;}
let drag=null;
function onBlockPointerDown(e){e.stopPropagation();if(e.button!==0)return;const bid=e.currentTarget.dataset.bid;const w=wk(activeWeek);const b=w.blocks.find(x=>x.id===bid);const body=e.currentTarget.parentElement;const pxPerMin=body.getBoundingClientRect().height/SPAN;const resizing=e.target.classList.contains("rzv");drag={mode:resizing?"resize":"move",bid,startY:e.clientY,pxPerMin,origS:t2m(b.s),origF:t2m(b.f),moved:false,el:e.currentTarget};e.currentTarget.setPointerCapture(e.pointerId);e.currentTarget.classList.add("dragging");e.currentTarget.addEventListener("pointermove",onBlockPointerMove);e.currentTarget.addEventListener("pointerup",onBlockPointerUp);}
function onBlockPointerMove(e){if(!drag)return;const w=wk(activeWeek);const b=w.blocks.find(x=>x.id===drag.bid);let dMin=Math.round(((e.clientY-drag.startY)/drag.pxPerMin)/SNAP)*SNAP;if(Math.abs(e.clientY-drag.startY)>3)drag.moved=true;if(drag.mode==="resize"){let nf=Math.min(DAY_END,Math.max(drag.origS+SNAP,drag.origF+dMin));b.f=m2t(nf);}else{const len=drag.origF-drag.origS;let ns=Math.max(DAY_START,Math.min(DAY_END-len,drag.origS+dMin));b.s=m2t(ns);b.f=m2t(ns+len);}posBlock(drag.el,b);}
function onBlockPointerUp(e){if(!drag)return;const moved=drag.moved,bid=drag.bid;drag.el.classList.remove("dragging");drag.el.removeEventListener("pointermove",onBlockPointerMove);drag.el.removeEventListener("pointerup",onBlockPointerUp);drag=null;const w=wk(activeWeek);const b=w.blocks.find(x=>x.id===bid);if(!moved){if(paint){applyPaint(bid);}else{openEditor(bid);}}else{normalizeBreaks(w);saveShift(b);renderPlanner();}}
let bdrag=null;
function onBreakPointerDown(e){e.stopPropagation();const brkEl=e.currentTarget;const blk=brkEl.parentElement;const bid=blk.dataset.bid;const w=wk(activeWeek);const b=w.blocks.find(x=>x.id===bid);if(e.target.classList.contains("bd")){b.brk=null;b.noBreak=true;saveShift(b);renderPlanner();return;}const body=blk.parentElement;const pxPerMin=body.getBoundingClientRect().height/SPAN;let mode="move";if(e.target.classList.contains("rt"))mode="top";else if(e.target.classList.contains("rb"))mode="bottom";bdrag={bid,mode,startY:e.clientY,pxPerMin,origAt:b.brk.at,origLen:b.brk.len,el:brkEl};brkEl.setPointerCapture(e.pointerId);brkEl.addEventListener("pointermove",onBreakPointerMove);brkEl.addEventListener("pointerup",onBreakPointerUp);}
function onBreakPointerMove(e){if(!bdrag)return;const w=wk(activeWeek);const b=w.blocks.find(x=>x.id===bdrag.bid);let d=Math.round(((e.clientY-bdrag.startY)/bdrag.pxPerMin)/SNAP)*SNAP;const S=t2m(b.s),F=t2m(b.f);if(bdrag.mode==="move")b.brk.at=Math.max(S,Math.min(F-b.brk.len,bdrag.origAt+d));else if(bdrag.mode==="bottom")b.brk.len=Math.max(15,Math.min(F-b.brk.at,bdrag.origLen+d));else{const end=bdrag.origAt+bdrag.origLen;let na=Math.max(S,Math.min(end-15,bdrag.origAt+d));b.brk.at=na;b.brk.len=end-na;}const raw=rawDur(b)*60;bdrag.el.style.top=((b.brk.at-S)/raw*100)+"%";bdrag.el.style.height=(b.brk.len/raw*100)+"%";}
function onBreakPointerUp(e){if(!bdrag)return;const b=wk(activeWeek).blocks.find(x=>x.id===bdrag.bid);bdrag.el.removeEventListener("pointermove",onBreakPointerMove);bdrag.el.removeEventListener("pointerup",onBreakPointerUp);bdrag=null;saveShift(b);renderPlanner();}
let rdrag=null;
function onRestPointerDown(e){e.stopPropagation();const restEl=e.currentTarget;const blk=restEl.parentElement;const bid=blk.dataset.bid;const w=wk(activeWeek);const b=w.blocks.find(x=>x.id===bid);if(e.target.classList.contains("bd")){b.rest=null;b.noRest=true;saveShift(b);renderPlanner();return;}const body=blk.parentElement;const pxPerMin=body.getBoundingClientRect().height/SPAN;rdrag={bid,startY:e.clientY,pxPerMin,origAt:b.rest.at,el:restEl};restEl.setPointerCapture(e.pointerId);restEl.addEventListener("pointermove",onRestPointerMove);restEl.addEventListener("pointerup",onRestPointerUp);}
function onRestPointerMove(e){if(!rdrag)return;const b=wk(activeWeek).blocks.find(x=>x.id===rdrag.bid);let d=Math.round(((e.clientY-rdrag.startY)/rdrag.pxPerMin)/SNAP)*SNAP;b.rest.at=Math.max(t2m(b.s),Math.min(t2m(b.f)-REST,rdrag.origAt+d));const raw=rawDur(b)*60;rdrag.el.style.top=((b.rest.at-t2m(b.s))/raw*100)+"%";}
function onRestPointerUp(e){if(!rdrag)return;const b=wk(activeWeek).blocks.find(x=>x.id===rdrag.bid);rdrag.el.removeEventListener("pointermove",onRestPointerMove);rdrag.el.removeEventListener("pointerup",onRestPointerUp);rdrag=null;saveShift(b);renderPlanner();}
// ---- right-click menu + paint tool ----
function activeStaff(){return staff.filter(s=>s.active!==false);}
function typeBadge(s){const t=s.employment_type||'casual';const mh=(s.min_hours!=null?s.min_hours:'');if(t==='full')return 'F'+mh;if(t==='part')return 'P'+mh;return 'C';}
function cafeActId(){const c=acts.find(a=>a.name==='Cafe service');return c?c.id:(fixedActs()[0]?fixedActs()[0].id:(acts[0]?acts[0].id:null));}
function staffDefaultAct(s){return (s&&s.default_activity_id)||cafeActId();}
function actChip(id){const a=actById(id);return `<span class="chip" style="background:${a.color}" title="${a.name}">${a.emoji}</span>`;}
function onBlockContext(e){e.preventDefault();e.stopPropagation();showCtx(e.clientX,e.clientY,e.currentTarget.dataset.bid);}
function closeCtx(){const m=document.getElementById("ctxMenu");if(m)m.remove();document.removeEventListener("pointerdown",ctxOutside,true);}
function ctxOutside(e){const m=document.getElementById("ctxMenu");if(m&&!m.contains(e.target))closeCtx();}
function showCtx(x,y,bid){closeCtx();const w=wk(activeWeek);const b=w.blocks.find(z=>z.id===bid);if(!b)return;const m=document.createElement("div");m.className="ctxmenu";m.id="ctxMenu";
  let h=`<div class="ctxh">Assign to</div><div class="ctxi" onclick="ctxSet('${bid}','sid','')">❓ Unassigned</div>`+activeStaff().map(s=>`<div class="ctxi" onclick="ctxSet('${bid}','sid','${s.id}')">${s.id===b.sid?'• ':''}${s.first_name}</div>`).join("");
  h+=`<div class="ctxh">Change task</div>`+acts.map(a=>`<div class="ctxi" onclick="ctxSet('${bid}','act','${a.id}')">${a.id===b.act?'• ':''}${a.emoji} ${a.name}</div>`).join("");
  m.innerHTML=h;document.body.appendChild(m);
  const mw=m.offsetWidth||160,mh=m.offsetHeight||300;m.style.left=Math.min(x,window.innerWidth-mw-6)+"px";m.style.top=Math.min(y,window.innerHeight-mh-6)+"px";
  setTimeout(()=>document.addEventListener("pointerdown",ctxOutside,true),0);}
async function ctxSet(bid,field,val){const w=wk(activeWeek);const b=w.blocks.find(z=>z.id===bid);if(!b){closeCtx();return;}if(field==='sid')b.sid=val||null;else b.act=val;closeCtx();await saveShift(b);renderPlanner();}
function setPaint(kind,id){if(kind===null||(paint&&paint.kind===kind&&paint.id===id))paint=null;else paint={kind,id};renderPaintBanner();renderPlanner();}
function paintLabel(){if(!paint)return"";if(paint.kind==='act'){const a=actById(paint.id);return a.emoji+" "+a.name;}return staffById(paint.id).first_name;}
function renderPaintBanner(){let el=document.getElementById("paintBanner");if(!paint){if(el)el.remove();document.body.classList.remove("painting");return;}if(!el){el=document.createElement("div");el.id="paintBanner";el.className="paintbanner";document.body.appendChild(el);}el.innerHTML=`🖌 Painting <b>${paintLabel()}</b> — click shifts to apply <button class="btn ghost small" onclick="setPaint(null)">Stop</button>`;document.body.classList.add("painting");}
async function applyPaint(bid){const w=wk(activeWeek);const b=w.blocks.find(z=>z.id===bid);if(!b)return;if(paint.kind==='act')b.act=paint.id;else b.sid=paint.id;await saveShift(b);renderPlanner();}
async function onDayPointerDown(e){if(e.button!==0)return;if(e.target.classList.contains("vblk")||e.target.classList.contains("rzv")||e.target.classList.contains("lbl")||e.target.classList.contains("brk")||e.target.classList.contains("rest"))return;const body=e.currentTarget;const day=+body.dataset.day;const rect=body.getBoundingClientRect();let mins=DAY_START+(e.clientY-rect.top)/rect.height*SPAN;mins=Math.round(mins/SNAP)*SNAP;let s=Math.max(DAY_START,Math.min(DAY_END-120,mins));const w=wk(activeWeek);
  let sid=null,act=(variableActs()[0]||acts[0]).id;
  if(paint&&paint.kind==='staff'){sid=paint.id;act=staffDefaultAct(staffById(paint.id))||act;}
  else if(paint&&paint.kind==='act'){act=paint.id;}
  const nb={week_id:w.id,sid,act,day,s:m2t(s),f:m2t(s+120),label:null,brk:null,rest:null,noBreak:false,noRest:false,sick:false};normalizeBreaks({blocks:[nb]});await addShiftRow(nb);w.blocks.push(nb);renderPlanner();}

function renderJobPanel(){const w=wk(activeWeek);const jb=document.getElementById("jobTable");jb.innerHTML="";let tPlan=0,tRos=0;variableActs().forEach(t=>{const plan=planHours(w,t),ros=actHours(w,t.id),diff=ros-plan;tPlan+=plan;tRos+=ros;const tr=document.createElement("tr");tr.innerHTML=`<td>${t.emoji} ${t.name}<div class="muted" style="font-size:10.5px">${t.units_per_hour} ${t.unit}/hr</div></td><td class="num"><input type="number" style="width:78px" value="${w.demand[t.id]||0}" onchange="setDemand('${t.id}',this.value)"> <span class="muted" style="font-size:10px">${t.unit}</span></td><td class="num">${plan.toFixed(1)}</td><td class="num">${ros.toFixed(1)}</td><td class="num ${diff<0?'over':''}">${diff>=0?'+':''}${diff.toFixed(1)}</td>`;jb.appendChild(tr);});const sep=document.createElement("tr");sep.className="sep";sep.innerHTML=`<td colspan="5">Fixed roles</td>`;jb.appendChild(sep);fixedActs().forEach(f=>{const plan=planHours(w,f),ros=actHours(w,f.id),diff=ros-plan;tPlan+=plan;tRos+=ros;const tr=document.createElement("tr");tr.innerHTML=`<td>${f.emoji} ${f.name}</td><td class="num muted">${f.weekly_hours||0}h/wk</td><td class="num">${plan.toFixed(1)}</td><td class="num">${ros.toFixed(1)}</td><td class="num ${diff<0?'over':''}">${diff>=0?'+':''}${diff.toFixed(1)}</td>`;jb.appendChild(tr);});
  const oa=otherActs();if(oa.length){const sp2=document.createElement("tr");sp2.className="sep";sp2.innerHTML=`<td colspan="5">Other tasks (not totalled)</td>`;jb.appendChild(sp2);oa.forEach(o=>{const ros=actHours(w,o.id);tRos+=ros;const tr=document.createElement("tr");tr.innerHTML=`<td>${o.emoji} ${o.name}</td><td class="num muted">—</td><td class="num muted">—</td><td class="num">${ros.toFixed(1)}</td><td class="num muted">—</td>`;jb.appendChild(tr);});}
  document.getElementById("jobFoot").innerHTML=`<tr class="totrow"><td>Total</td><td></td><td class="num">${tPlan.toFixed(1)}</td><td class="num">${tRos.toFixed(1)}</td><td class="num">${(tRos-tPlan>=0?'+':'')}${(tRos-tPlan).toFixed(1)}</td></tr>`;}
async function setDemand(aid,val){const w=wk(activeWeek);w.demand[aid]=+val||0;await saveDemand(w.id,aid,w.demand[aid]);renderJobPanel();renderStats();}
function renderEmployeePanel(){const w=wk(activeWeek);const pt=document.getElementById("personTable");pt.innerHTML="";const hide=`<span class="money-hidden">•••</span>`;let totPay=0;staff.filter(s=>s.active!==false||staffHours(w,s.id)>0).forEach(s=>{const h=staffHours(w,s.id);const pay=h*s.rate;totPay+=pay;let cls="";if(s.max_hours!=null&&h>s.max_hours+1e-9)cls="over";else if(s.min_hours!=null&&h<s.min_hours-1e-9)cls="warnunder";const pbon=paint&&paint.kind==='staff'&&paint.id===s.id?'on':'';const tr=document.createElement("tr");tr.innerHTML=`<td>${s.first_name} <span class="tbadge">${typeBadge(s)}</span> ${actChip(staffDefaultAct(s))}${s.active===false?' <span class="muted" style="font-size:9px">(inactive)</span>':''} <span class="paintbtn ${pbon}" title="Paint this person onto shifts" onclick="setPaint('staff','${s.id}')">🖌</span></td><td class="num ${cls}">${h.toFixed(1)}</td><td class="num muted">${s.min_hours!=null?s.min_hours:'—'}</td><td class="num muted">${s.max_hours!=null?s.max_hours:'—'}</td><td class="num">${payRevealed?'$'+s.rate:hide}</td><td class="num">${payRevealed?money(pay):hide}</td>`;pt.appendChild(tr);});document.getElementById("personFoot").innerHTML=`<tr class="totrow"><td>Total</td><td class="num">${rosteredHours(w).toFixed(1)}</td><td></td><td></td><td></td><td class="num">${payRevealed?money(totPay):hide}</td></tr>`;const rb=document.getElementById("revealBtn");if(rb)rb.textContent=payRevealed?"🙈 Hide pay":"👁 Reveal pay (20s)";}
function revealPay(){payRevealed=!payRevealed;if(payTimer){clearTimeout(payTimer);payTimer=null;}if(payRevealed)payTimer=setTimeout(()=>{payRevealed=false;renderEmployeePanel();},20000);renderEmployeePanel();}
function renderStats(){const w=wk(activeWeek);const cost=projectedCost(w),bud=w.budget;document.getElementById("bTargetHrs").textContent=targetHours(w).toFixed(1);document.getElementById("bRosterHrs").textContent=rosteredHours(w).toFixed(1);document.getElementById("bCost").textContent=cost>0?money(cost):"$0";document.getElementById("bBudget").textContent=money(bud);const pct=bud>0?cost/bud:0;const fill=document.getElementById("bBudgetFill");fill.style.width=Math.min(pct,1)*100+"%";let col=getComputedStyle(document.documentElement).getPropertyValue('--green');if(pct>1)col=getComputedStyle(document.documentElement).getPropertyValue('--red');else if(pct>0.9)col=getComputedStyle(document.documentElement).getPropertyValue('--amber');fill.style.background=col;const rem=bud-cost;const lbl=document.getElementById("bBudgetLbl");lbl.textContent=(rem>=0?money(rem)+" under budget":money(-rem)+" OVER budget")+`  ·  ${Math.round(pct*100)}% used`;lbl.style.color=pct>0.55?"#fff":"var(--ink)";}

function openEditor(bid){const w=wk(activeWeek);const b=w.blocks.find(x=>x.id===bid);if(!b)return;const bg=document.createElement("div");bg.className="modal-bg";bg.id="editorBg";bg.innerHTML=`<div class="modal" onclick="event.stopPropagation()"><h3>Edit shift</h3>
  <div class="frow"><label>Task</label><select id="eAct">${acts.map(a=>`<option value="${a.id}" ${a.id===b.act?'selected':''}>${a.emoji} ${a.name}</option>`).join("")}</select></div>
  <div class="frow"><label>Custom name (optional — e.g. one-off job)</label><input id="eLabel" value="${b.label?b.label.replace(/"/g,'&quot;'):''}" placeholder="leave blank to use task name"></div>
  <div class="row"><div class="field" style="flex:1"><label>Start</label><input type="time" id="eStart" value="${b.s}"></div><div class="field" style="flex:1"><label>Finish</label><input type="time" id="eFinish" value="${b.f}"></div></div>
  <div class="row" style="margin-top:12px"><div class="field" style="flex:1"><label>Staff</label><select id="eStaff"><option value="" ${!b.sid?'selected':''}>— Unassigned (?)</option>${staff.filter(s=>s.active!==false||s.id===b.sid).map(s=>`<option value="${s.id}" ${s.id===b.sid?'selected':''}>${s.first_name} ${s.last_name}</option>`).join("")}</select></div><div class="field" style="flex:1"><label>Day</label><select id="eDay">${DAYS.map((d,i)=>`<option value="${i}" ${i===b.day?'selected':''}>${d}</option>`).join("")}</select></div></div>
  <div class="frow" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px"><button class="btn ghost small" onclick="toggleSick('${bid}')">${b.sick?'✅ Clear sick':'🤒 Mark sick'}</button>${rawDur(b)>REST_MIN?`<button class="btn ghost small" onclick="toggleRest('${bid}')">${b.rest?'☕ Remove rest':'☕ Add rest'}</button>`:''}${rawDur(b)>MEAL_MIN?`<button class="btn ghost small" onclick="toggleBreak('${bid}')">${b.brk?'🍽️ Remove meal':'🍽️ Add meal'}</button>`:''}</div>
  <p class="sub" style="margin:8px 0 0">☕ Paid rest (10 min) over 2h · 🍽️ unpaid meal (30 min) over 4h — drag on the bar to place.</p>
  <div class="actions"><button class="btn link" onclick="deleteBlock('${bid}')">Delete</button><div><button class="btn ghost small" onclick="closeEditor()">Cancel</button><button class="btn primary small" style="margin-left:6px" onclick="saveEditor('${bid}')">Save</button></div></div></div>`;bg.onclick=closeEditor;document.body.appendChild(bg);}
function closeEditor(){const e=document.getElementById("editorBg");if(e)e.remove();}
async function saveEditor(bid){const w=wk(activeWeek);const b=w.blocks.find(x=>x.id===bid);b.act=document.getElementById("eAct").value;const lbl=document.getElementById("eLabel").value.trim();b.label=lbl||null;let s=document.getElementById("eStart").value,f=document.getElementById("eFinish").value;if(t2m(f)<=t2m(s))f=m2t(t2m(s)+60);b.s=s;b.f=f;b.sid=document.getElementById("eStaff").value||null;b.day=+document.getElementById("eDay").value;b.brk=null;normalizeBreaks(w);await saveShift(b);closeEditor();renderPlanner();}
async function deleteBlock(bid){const w=wk(activeWeek);await delShiftRow(bid);w.blocks=w.blocks.filter(x=>x.id!==bid);closeEditor();renderPlanner();}
async function toggleSick(bid){const w=wk(activeWeek);const b=w.blocks.find(x=>x.id===bid);b.sick=!b.sick;if(b.sick)b.brk=null;await saveShift(b);closeEditor();renderPlanner();openEditor(bid);}
async function toggleBreak(bid){const w=wk(activeWeek);const b=w.blocks.find(x=>x.id===bid);if(b.brk){b.brk=null;b.noBreak=true;}else b.noBreak=false;normalizeBreaks(w);await saveShift(b);closeEditor();renderPlanner();openEditor(bid);}
async function toggleRest(bid){const w=wk(activeWeek);const b=w.blocks.find(x=>x.id===bid);if(b.rest){b.rest=null;b.noRest=true;}else b.noRest=false;normalizeBreaks(w);await saveShift(b);closeEditor();renderPlanner();openEditor(bid);}

async function addWeek(){const last=weeks[weeks.length-1];const d=new Date((last?last.start:"2026-07-19")+"T00:00");d.setDate(d.getDate()+7);const {data,error}=await sb.from("roster_weeks").insert({start_date:d.toISOString().slice(0,10),budget:last?last.budget:5000,status:"Draft"}).select().single();if(error){toast("Could not add week");return;}weeks.push({...data,start:data.start_date,demand:{},blocks:[]});activeWeek=data.id;renderPlanner();}
async function copyPrevWeek(){const w=wk(activeWeek);const p=prevWeekOf(w);if(!p){toast("No earlier week to copy");return;}if(w.blocks.length&&!confirm("Replace this week's shifts with a copy of week ending "+fmtDate(weekEnding(p))+"?"))return;for(const b of w.blocks){await delShiftRow(b.id);}w.blocks=[];for(const src of p.blocks){const nb={week_id:w.id,sid:src.sid,act:src.act,day:src.day,s:src.s,f:src.f,label:src.label,brk:src.brk?{...src.brk}:null,rest:src.rest?{...src.rest}:null,noBreak:src.noBreak,noRest:src.noRest,sick:false};await addShiftRow(nb);w.blocks.push(nb);}if(Object.keys(w.demand).length===0){for(const k in p.demand){w.demand[k]=p.demand[k];await saveDemand(w.id,k,p.demand[k]);}}normalizeBreaks(w);renderPlanner();toast("Copied last week");}
async function addShiftForm(){const w=wk(activeWeek);if(!w){toast("Create a week first");return;}const nb={week_id:w.id,sid:null,act:variableActs()[0].id,day:1,s:"09:00",f:"13:00",label:null,brk:null,rest:null,noBreak:false,noRest:false,sick:false};normalizeBreaks({blocks:[nb]});await addShiftRow(nb);w.blocks.push(nb);renderPlanner();openEditor(nb.id);}
async function deleteWeek(){const w=wk(activeWeek);if(!w){toast("No week selected");return;}if(!confirm(`Delete the week ending ${fmtDate(weekEnding(w))}? This removes all its shifts and can't be undone.`))return;const {error}=await sb.from("roster_weeks").delete().eq("id",w.id);if(error){toast("Delete failed");return;}weeks=weeks.filter(x=>x.id!==w.id);activeWeek=weeks.length?weeks[weeks.length-1].id:null;renderPlanner();toast("Week deleted");}
function copyDay(d){const w=wk(activeWeek);dayClip=w.blocks.filter(b=>b.day===d).map(b=>({sid:b.sid,act:b.act,s:b.s,f:b.f,label:b.label,brk:b.brk?{...b.brk}:null,rest:b.rest?{...b.rest}:null,noBreak:b.noBreak,noRest:b.noRest,sick:b.sick}));toast(dayClip.length?`Copied ${DAYS[d]} (${dayClip.length} shift${dayClip.length>1?'s':''}) — click 📋 on another day`:`${DAYS[d]} is empty`);renderPlanner();}
async function pasteDay(d){if(!dayClip)return;const w=wk(activeWeek);const existing=w.blocks.filter(b=>b.day===d);if(existing.length&&!confirm(`Replace ${DAYS[d]}'s ${existing.length} shift(s) with the copied day?`))return;for(const b of existing){await delShiftRow(b.id);}w.blocks=w.blocks.filter(b=>b.day!==d);for(const src of dayClip){const nb={week_id:w.id,sid:src.sid,act:src.act,day:d,s:src.s,f:src.f,label:src.label,brk:src.brk?{...src.brk}:null,rest:src.rest?{...src.rest}:null,noBreak:src.noBreak,noRest:src.noRest,sick:false};await addShiftRow(nb);w.blocks.push(nb);}normalizeBreaks(w);renderPlanner();toast(`Pasted into ${DAYS[d]}`);}
async function clearDay(d){const w=wk(activeWeek);const bl=w.blocks.filter(b=>b.day===d);if(!bl.length){toast(`${DAYS[d]} already empty`);return;}if(!confirm(`Clear all ${bl.length} shift(s) on ${DAYS[d]}?`))return;for(const b of bl){await delShiftRow(b.id);}w.blocks=w.blocks.filter(b=>b.day!==d);renderPlanner();toast(`Cleared ${DAYS[d]}`);}
async function toggleHoliday(d){const w=wk(activeWeek);w.holidays=w.holidays||[];w.holidays=w.holidays.includes(d)?w.holidays.filter(x=>x!==d):[...w.holidays,d];await saveWeek(w);renderPlanner();}
async function addStaff(){const {data,error}=await sb.from("roster_staff").insert({first_name:"New staff",last_name:"",email:"",rate:25,employment_type:"casual",default_activity_id:cafeActId(),sort_order:staff.length+1}).select().single();if(error){toast("Add failed");return;}staff.push({...data,name:data.first_name});renderSettings();toast("Staff added — edit their details");}
async function saveAsTemplate(){const w=wk(activeWeek);if(!w){toast("No week to save");return;}const name=prompt("Template name:","Standard week");if(!name)return;const data={shifts:w.blocks.map(b=>({day:b.day,sid:b.sid,act:b.act,s:b.s,f:b.f,label:b.label,brk:b.brk?{...b.brk}:null,rest:b.rest?{...b.rest}:null,noBreak:b.noBreak,noRest:b.noRest})),demand:{...w.demand},holidays:w.holidays||[]};const {data:row,error}=await sb.from("roster_templates").insert({name,data}).select().single();if(error){toast("Save failed");return;}templates.push(row);renderPlanner();toast(`Saved template “${name}”`);}
async function applyTemplate(id){if(!id)return;const t=templates.find(x=>x.id===id);if(!t)return;const w=wk(activeWeek);if(w.blocks.length&&!confirm(`Replace this week's shifts with template “${t.name}”?`))return;for(const b of w.blocks){await delShiftRow(b.id);}w.blocks=[];const d=t.data||{};for(const src of (d.shifts||[])){const nb={week_id:w.id,sid:src.sid,act:src.act,day:src.day,s:src.s,f:src.f,label:src.label,brk:src.brk?{...src.brk}:null,rest:src.rest?{...src.rest}:null,noBreak:src.noBreak,noRest:src.noRest,sick:false};await addShiftRow(nb);w.blocks.push(nb);}w.demand={...(d.demand||{})};for(const k in w.demand){await saveDemand(w.id,k,w.demand[k]);}w.holidays=d.holidays||[];await saveWeek(w);normalizeBreaks(w);renderPlanner();toast(`Applied “${t.name}”`);}
function renderTemplateSelect(){const el=document.getElementById("tmplWrap");if(!el)return;el.innerHTML=templates.length?`<label>Apply template</label><select onchange="applyTemplate(this.value);this.value=''"><option value="">Choose…</option>${templates.map(t=>`<option value="${t.id}">${t.name}</option>`).join("")}</select>`:"";}

function renderSettings(){document.getElementById("settingsMode").innerHTML=`

    <div><label style="font-size:13px;color:var(--ink);font-weight:600;margin-bottom:8px">Staff, rates &amp; hour limits</label>

      <div class="tablewrap"><table><thead><tr><th>Emoji</th><th>Task</th><th class="num">Units/hr</th></tr></thead><tbody id="taskBody"></tbody></table></div>
      <label style="font-size:13px;color:var(--ink);font-weight:600;margin:18px 0 8px">Fixed roles — emoji, weekly hours</label>

  const sb2=document.getElementById("staffBody");staff.forEach(s=>{const tr=document.createElement("tr");if(s.active===false)tr.style.opacity=".55";tr.innerHTML=`<td><input value="${s.first_name}" onchange="editStaff('${s.id}','first_name',this.value)"></td><td><input value="${s.email||''}" onchange="editStaff('${s.id}','email',this.value)"></td><td><select onchange="editStaff('${s.id}','employment_type',this.value)"><option value="casual" ${(!s.employment_type||s.employment_type==='casual')?'selected':''}>Casual</option><option value="part" ${s.employment_type==='part'?'selected':''}>Part</option><option value="full" ${s.employment_type==='full'?'selected':''}>Full</option></select></td><td class="num"><input type="number" style="width:60px" value="${s.rate}" onchange="editStaff('${s.id}','rate',this.value)"></td><td class="num"><input type="number" style="width:52px" value="${s.min_hours!=null?s.min_hours:''}" onchange="editStaff('${s.id}','min_hours',this.value)"></td><td class="num"><input type="number" style="width:52px" value="${s.max_hours!=null?s.max_hours:''}" onchange="editStaff('${s.id}','max_hours',this.value)"></td><td><select onchange="editStaff('${s.id}','default_activity_id',this.value)">${acts.map(a=>`<option value="${a.id}" ${a.id===staffDefaultAct(s)?'selected':''}>${a.emoji} ${a.name}</option>`).join("")}</select></td><td style="text-align:center"><input type="checkbox" ${s.active!==false?'checked':''} onchange="editStaff('${s.id}','active',this.checked)"></td>`;sb2.appendChild(tr);});
  const tb=document.getElementById("taskBody");variableActs().forEach(t=>{const tr=document.createElement("tr");tr.innerHTML=`<td><input value="${t.emoji}" style="width:44px;text-align:center" onchange="editAct('${t.id}','emoji',this.value)"></td><td><input value="${t.name}" onchange="editAct('${t.id}','name',this.value)"></td><td class="num"><input type="number" style="width:70px" value="${t.units_per_hour}" onchange="editAct('${t.id}','units_per_hour',this.value)"></td>`;tb.appendChild(tr);});
  const fb=document.getElementById("fixedBody");fixedActs().forEach(f=>{const tr=document.createElement("tr");tr.innerHTML=`<td><input value="${f.emoji}" style="width:44px;text-align:center" onchange="editAct('${f.id}','emoji',this.value)"></td><td><input value="${f.name}" onchange="editAct('${f.id}','name',this.value)"></td><td class="num"><input type="number" style="width:66px" value="${f.weekly_hours}" onchange="editAct('${f.id}','weekly_hours',this.value)"></td>`;fb.appendChild(tr);});}
async function editStaff(id,f,v){const s=staff.find(x=>x.id===id);if(f==="rate")s.rate=+v||0;else if(f==="min_hours"||f==="max_hours")s[f]=(v===""?null:+v);else s[f]=v;s.name=s.first_name;await saveStaff(s);if(f==="active"||f==="employment_type")renderSettings();}
async function editAct(id,f,v){const a=acts.find(x=>x.id===id);a[f]=(f==="units_per_hour"||f==="weekly_hours")?(+v||0):v;familyColor();await saveActivity(a);}

// ================= public (in-app tab) =================
function renderPublicInApp(){const pm=document.getElementById("publicMode");const published=weeks.filter(isLive);if(!published.length){pm.innerHTML=`<div class="card"><p class="muted">No weeks published yet.</p></div>`;return;}if(!published.find(w=>w.id===pubWeek))pubWeek=published[0].id;pm.innerHTML=`<div class="pubhead"><h2>Revive — Weekly Roster</h2><div id="pubWeekLabel" style="margin-top:4px;opacity:.9"></div></div><div class="weektabs" id="pubWeektabs"></div><div class="card"><div class="legend" id="pubLegend"></div><div class="tablewrap"><div class="board" id="pubBoard"></div></div><p class="sub" style="margin-top:14px">This is what staff see at the public link (no pay or cost). 🍽️ = unpaid meal break.</p></div>`;drawPublic(pubWeek,id=>{pubWeek=id;renderPublicInApp();});}
function drawPublic(weekId,onTab){renderWeekTabsGeneric("pubWeektabs",onTab,isLive,weekId);const w=wk(weekId);normalizeBreaks(w);document.getElementById("pubWeekLabel").textContent="Week ending "+fmtDate(weekEnding(w))+" · Sun–Fri · "+w.status;renderLegend("pubLegend");const pb=document.getElementById("pubBoard");pb.innerHTML="";const head=document.createElement("div");head.className="brow head";head.innerHTML=`<div class="bcell name"><span class="nm">Staff</span></div>`+DAYS.map(d=>`<div class="bcell hd">${d}</div>`).join("")+`<div class="bcell hd">Total</div>`;pb.appendChild(head);staff.forEach(s=>{if(staffHours(w,s.id)===0)return;const row=document.createElement("div");row.className="brow";row.innerHTML=`<div class="bcell name"><span class="nm">${s.first_name}</span></div>`;for(let d=0;d<6;d++){const bl=w.blocks.filter(b=>b.sid===s.id&&b.day===d).sort((a,b)=>t2m(a.s)-t2m(b.s));const cell=document.createElement("div");cell.className="bcell pubcell";cell.innerHTML=bl.map(b=>{const a=actById(b.act);return `<div class="pubblk" style="background:${a.color}">${a.emoji} ${fmtT(b.s)}–${fmtT(b.f)}${b.brk?' 🍽️':''}<br>${b.label||a.name.split(" ")[0]}</div>`;}).join("")||`<span class="muted" style="font-size:11px">—</span>`;row.appendChild(cell);}const tot=document.createElement("div");tot.className="bcell tot";tot.textContent=staffHours(w,s.id).toFixed(1)+"h";row.appendChild(tot);pb.appendChild(row);});}

// ================= standalone public page (?view=public) =================
async function bootPublic(weekParam){
  const [ac,pv]=await Promise.all([sb.from("roster_activities").select("*").order("sort_order"),sb.from("roster_public_schedule").select("*")]);
  acts=(ac.data||[]).map(a=>({...a}));familyColor();
  const rows=pv.data||[];
  const byWeek={};rows.forEach(r=>{(byWeek[r.week_id]=byWeek[r.week_id]||{id:r.week_id,start:r.start_date,status:r.status,blocks:[],staff:{}}).blocks.push({sid:r.staff_id,day:r.day,s:m2t(r.start_min),f:m2t(r.end_min),act_name:r.activity_name,emoji:r.emoji,label:r.custom_label,meal:r.meal_at!=null});byWeek[r.week_id].staff[r.staff_id]=r.first_name;});
  const wks=Object.values(byWeek).sort((a,b)=>a.start<b.start?-1:1);
  const root=document.getElementById("root");
  if(!wks.length){root.innerHTML=`<div class="wrap"><div class="pubhead"><h2>Revive — Weekly Roster</h2></div><div class="card"><p class="muted">No roster published yet.</p></div></div>`;return;}
  let cur=weekParam&&byWeek[weekParam]?weekParam:wks[wks.length-1].id;
  function draw(){const w=byWeek[cur];const names=[...new Set(w.blocks.map(b=>b.sid))];
    root.innerHTML=`<div class="wrap"><div class="pubhead"><img src="https://www.revive.co.nz/cdn/shop/files/01-060_Revive_Cafe_Logo_240x.png?v=1626572048" style="height:34px;float:right"><h2>Revive — Weekly Roster</h2><div style="margin-top:4px;opacity:.9">Week ending ${fmtDate(weekEnding(w))} · Sunday–Friday · ${w.status}</div></div>
    <div class="weektabs" id="pt"></div><div class="card"><div class="tablewrap"><div class="board" id="pbd"></div></div><p class="sub" style="margin-top:14px">🍽️ marks an unpaid meal break.</p></div></div>`;
    const pt=document.getElementById("pt");wks.forEach(x=>{const b=document.createElement("button");b.className=x.id===cur?"active":"";b.textContent="Week ending "+fmtDate(weekEnding(x));b.onclick=()=>{cur=x.id;draw();};pt.appendChild(b);});
    const pb=document.getElementById("pbd");const head=document.createElement("div");head.className="brow head";head.innerHTML=`<div class="bcell name"><span class="nm">Staff</span></div>`+DAYS.map(d=>`<div class="bcell hd">${d}</div>`).join("")+`<div class="bcell hd">Total</div>`;pb.appendChild(head);
    names.forEach(sid=>{const row=document.createElement("div");row.className="brow";let tot=0;let cells="";for(let d=0;d<6;d++){const bl=w.blocks.filter(b=>b.sid===sid&&b.day===d).sort((a,b)=>t2m(a.s)-t2m(b.s));bl.forEach(b=>tot+=(t2m(b.f)-t2m(b.s))/60-(b.meal?0.5:0));cells+=`<div class="bcell pubcell">${bl.map(b=>`<div class="pubblk" style="background:${(acts.find(a=>a.name===b.act_name)||{color:'#888'}).color}">${b.emoji} ${fmtT(b.s)}–${fmtT(b.f)}${b.meal?' 🍽️':''}<br>${b.label||b.act_name.split(" ")[0]}</div>`).join("")||'<span class="muted" style="font-size:11px">—</span>'}</div>`;}row.innerHTML=`<div class="bcell name"><span class="nm">${w.staff[sid]}</span></div>`+cells+`<div class="bcell tot">${tot.toFixed(1)}h</div>`;pb.appendChild(row);});}
  draw();
}

document.addEventListener("keydown",e=>{if(e.key==="Escape"){if(paint)setPaint(null);closeCtx();}});
boot().catch(e=>{document.getElementById("root").innerHTML=`<div class="center"><div class="card"><h3>Something went wrong</h3><p class="sub">${(e&&e.message)||e}</p><a class="btn ghost" href="/">Back to portal</a></div></div>`;console.error(e);});
</script>
</body>
</html>
